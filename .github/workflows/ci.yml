name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  # Manual dispatch — used by pulpo-nightly.yml to force-trigger CI on
  # data-only nightly PRs whose pushes were authored by GITHUB_TOKEN
  # (Actions doesn't trigger downstream workflows from such pushes,
  # leaving the required `pytest` check stuck on "Expected — Waiting").
  workflow_dispatch: {}

jobs:
  ci:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.10"
          cache: pip

      # System binary for pytesseract (text-overlay detector tests in
      # tests/test_photo_quality.py). Without it, the positive-case
      # tests skip cleanly via @pytest.mark.skipif — kept here so the
      # behavior tests run on every PR rather than only on the nightly.
      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Test
        env:
          PULPO_OFFLINE: "1"
        run: pytest -q

      - name: Lint
        run: ruff check .

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run test --if-present
      - run: npm run build
