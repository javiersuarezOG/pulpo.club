name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  # Manual dispatch — used by pulpo-nightly.yml to force-trigger CI on
  # data-only nightly PRs whose pushes were authored by GITHUB_TOKEN
  # (Actions doesn't trigger downstream workflows from such pushes,
  # leaving the required `pytest` check stuck on "Expected — Waiting").
  workflow_dispatch: {}

jobs:
  ci:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Test
        env:
          PULPO_OFFLINE: "1"
        run: pytest -q

      - name: Lint
        run: ruff check .
