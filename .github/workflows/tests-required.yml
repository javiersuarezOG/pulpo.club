name: Tests Required

on:
  pull_request:
    branches: ["**"]
  # Same fallback rationale as ci.yml — pulpo-nightly.yml force-triggers
  # this workflow on dated data PRs to cover the GITHUB_TOKEN suppression.
  workflow_dispatch: {}

jobs:
  check-tests:
    name: Agent test coverage check
    runs-on: ubuntu-latest
    if: "!contains(github.event.pull_request.labels.*.name, 'no-test-required')"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get added files
        run: |
          git diff --name-only --diff-filter=A origin/${{ github.base_ref }}...HEAD > /tmp/added_files.txt
          echo "Added files:"
          cat /tmp/added_files.txt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check test coverage for new agents
        run: python .github/scripts/check_tests_added.py /tmp/added_files.txt
