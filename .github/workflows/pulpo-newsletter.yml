name: pulpo newsletter (dry-run)

# Weekly Monday cadence — fortnight gating lands in PR-NL-4 once the actual
# send pipeline (PR-NL-1) is verified. For now this runs every Monday at
# 14:00 UTC, builds the per-cohort dry-run HTML against the latest
# committed ranked.json, uploads the bundle as a CI artifact, and fires the
# matching PostHog telemetry. Nothing in this workflow talks to Resend.
#
# Manual trigger via workflow_dispatch — useful when you've just changed
# the renderer or commentary copy and want to eyeball the output without
# waiting for the schedule.

on:
  schedule:
    - cron: "0 14 * * 1"    # every Monday 14:00 UTC (08:00 SV)
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to stamp into the header (defaults to 1)"
        required: false
        default: "1"
      use_llm:
        description: "Toggle the DeepSeek commentary path (1 = on, 0 = deterministic)"
        required: false
        default: "0"

concurrency:
  group: pulpo-newsletter
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Deterministic dry-run by default. The LLM toggle is OFF unless the
      # workflow_dispatch input sets it explicitly — never burn DeepSeek
      # credits from a cron run while the send pipeline is still gated.
      PULPO_NEWSLETTER_USE_LLM: "${{ github.event.inputs.use_llm || '0' }}"
      # Telemetry — newsletter.issue_built / commentary_generated events
      # land in PostHog when the project token is wired. Same secrets the
      # nightly run uses; missing-token = silent no-op (per posthog_client.py).
      POSTHOG_PROJECT_TOKEN: "${{ secrets.POSTHOG_PROJECT_TOKEN }}"
      POSTHOG_HOST: "${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}"
      # Only consumed when use_llm is flipped on by a manual trigger; the
      # weekly cron leaves the deterministic fallback in charge.
      DEEPSEEK_API_TOKEN: "${{ secrets.DEEPSEEK_API_TOKEN }}"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      # PostHog SDK + (optional) openai SDK for the LLM toggle path.
      # The module degrades gracefully when these aren't importable, so the
      # build still succeeds in a stripped-down environment.
      - name: install runtime deps
        run: pip install -q posthog openai

      - name: assert ranked.json present
        run: |
          test -s web/data/ranked.json \
            || (echo "::error::web/data/ranked.json missing — run nightly first" && exit 1)

      - name: build dry-run cohort fixtures
        run: |
          python3 scripts/build_newsletter_dryrun.py \
            --issue-number "${{ github.event.inputs.issue_number || '1' }}"

      - name: upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-dryrun-${{ github.run_id }}
          path: newsletter-drafts/dryrun-*.html
          retention-days: 30
          if-no-files-found: error
