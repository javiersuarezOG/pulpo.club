name: pulpo nightly run

# Every night at 12:00 UTC = 06:00 in El Salvador (UTC-6).
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}    # also allow manual runs

# Single-flight: a manual trigger or a backed-up cron must not race a
# still-running nightly — both would try to PR-merge dated data branches and
# the second commit would lose. cancel-in-progress kills the older run.
concurrency:
  group: pulpo-nightly
  cancel-in-progress: true

# Count canaries — both fail the workflow without committing stale data.
# FLOOR: raise if clean baseline grows. CEILING: raise if ceiling is hit
# legitimately (new large source added). The asymmetry catches both supply
# collapse (broken scraper) and phantom inflation (parser bug, dedup failure).
# Baseline after Phase 1+2 cleanup: ~740 listings.
env:
  # Floor: catches scraper collapse (silent zero-yield from a source
  # going down). Set ~80% of the post-encuentra24 expected baseline.
  # Ceiling: catches runaway parser bugs (deduplication failure, etc.).
  # Bumped 2026-05-08 to fit encuentra24's first capped run (PULPO_E24_LIMIT=200
  # adds ~200 listings on top of the existing ~895 → ~1095). Lift the
  # ceiling further when we lift the encuentra24 cap.
  LISTING_COUNT_FLOOR: "700"    # ~64% of ~1095 baseline post-encuentra24
  LISTING_COUNT_CEILING: "1300" # ~120% of ~1095, leaves headroom

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard ceiling. A healthy run finishes in ~30 min; the LLM enrichment
    # leg can stretch to ~50 min on cold-cache nightlies (~900 listings ×
    # ~3.5s/call serial DeepSeek). Bumped to 120 to survive cold-cache
    # nightlies until enrichment is parallelised. Past 120 min something
    # is genuinely hung (typically photo download or detail-page fetch);
    # better to fail the job and have watchdog page than burn Actions
    # minutes silently.
    timeout-minutes: 120
    permissions:
      contents: write       # commit refreshed web/data/ back
      pull-requests: write  # gh pr create — main is PR-protected (#29's flow)
      # The fallback `gh workflow run ci.yml --ref BRANCH` step (added in
      # PR #69 to unblock the recurring 'pytest Expected' lockout) needs
      # this. Without it the dispatch returns HTTP 403 'Resource not
      # accessible by integration' and the data PR sits forever waiting
      # on required checks that never report.
      actions: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Use PAT so the bot push can write to main without a PR.
          # PULPO_BOT_TOKEN: fine-grained PAT, Contents: write on this repo.
          # Falls back to GITHUB_TOKEN (works since branch protection no longer
          # requires a PR on main).
          token: ${{ secrets.PULPO_BOT_TOKEN || github.token }}

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      # System binary for pytesseract (text-overlay detection in
      # automation/photo_quality.py). When absent, the detector returns
      # None and the elite featured-listing filter falls back to
      # "not flagged" — runs cleanly but without OCR exclusion.
      - name: Install Tesseract OCR
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Headless Chromium for the encuentra24 scraper (PR #187 added the
      # parser; this step adds the browser so the live crawl can run).
      # `--with-deps` installs system shared libraries (apt) needed by
      # Chromium on Ubuntu 24.04. Cold install is ~60s; we don't bother
      # caching the browser binary because nightly is once-a-day and the
      # cache invalidation rules around playwright versions create more
      # debugging surface than the saved seconds are worth.
      - name: Install Playwright + Chromium (encuentra24 scraper)
        run: |
          pip install playwright==1.49.1
          playwright install chromium --with-deps

      - name: Run pipeline
        env:
          PULPO_OFFLINE: "0"
          PULPO_LIMIT: "1000"
          # Disabled sources (re-add when the blocker is resolved):
          #   kazu              — Nuxt SPA, panel API denylisted; needs headless browser
          #   realtyelsalvador  — disabled 2026-05-06 after 3 consecutive nightly
          #                       failures with HTTP 403 from Azure datacenter IPs
          #                       (PR #67's header workaround did not help).
          #                       Local runs return ~126 listings cleanly. Re-add
          #                       when we have a residential proxy, a non-Azure
          #                       runner, or rewrite to scrape HTML detail pages
          #                       which may not be WAF-gated.
          # The scraper code, registration, and tests are kept in place — only
          # the env list excludes it, so reverting is a one-line change.
          #
          # encuentra24 added 2026-05-08 (PR-E2 follow-up to PR #187). First
          # run capped at 200 via PULPO_E24_LIMIT below — at ~7s/detail-page
          # in Playwright that's ~25 min; lift the cap once we've validated
          # one full nightly's data lands cleanly in ranked.json.
          PULPO_SOURCES: "goodlife,oceanside,century21,bienesraices,remax,nexo,encuentra24"
          # encuentra24-specific cap. Tightens against PULPO_LIMIT (the
          # global cap) but never raises it. Set to 200 for the first
          # validated runs; raise to e.g. 1000 once we've measured runtime
          # impact on a real nightly.
          PULPO_E24_LIMIT: "200"
          # PRD §FR-6 AI enrichment. The single-call DeepSeek flow (PRs
          # #79-81) reads DEEPSEEK_API_TOKEN. When unset, llm_enrichment
          # graceful-skips and listings get fallback templates only —
          # full pipeline still runs.
          # Provision via: gh secret set DEEPSEEK_API_TOKEN
          DEEPSEEK_API_TOKEN: ${{ secrets.DEEPSEEK_API_TOKEN }}
          # Bounded concurrency for the LLM enrichment fan-out. 8 in-flight
          # DeepSeek calls keeps us comfortably under their published rate
          # limit while collapsing what was a ~50-min serial loop into ~5-7
          # min. Run 25456987618 (2026-05-06) hit the 60-min wall mid-loop
          # because of the previous serial fan-out.
          PULPO_LLM_CONCURRENCY: "8"
          # Soft-fail deadline for enrichment (seconds from start of the
          # enrichment leg). Leaves ~30 min of budget for everything that
          # comes after enrichment (fallback templates, photo download,
          # write JSON, commit + PR). Past the deadline, no NEW DeepSeek
          # calls go out — in-flight ones complete; deferred listings get
          # picked up next nightly via the sidecar cache. The pipeline
          # ALWAYS ships rather than dying inside the LLM loop.
          PULPO_LLM_DEADLINE_SECONDS: "5400"   # 90 min
          # PostHog server-side telemetry — feeds the Analytics-basics
          # dashboard (pipeline_started/completed, crawl_succeeded/failed,
          # llm_enrichment_completed, regression_guard_triggered). Same
          # `phc_...` project key as the frontend (it's the ingest write
          # key, safe to reuse server-side). When the secret is unset the
          # pipeline runs unchanged — automation/posthog_client.py
          # silent-no-ops.
          POSTHOG_PROJECT_TOKEN: ${{ secrets.POSTHOG_PROJECT_TOKEN }}
          POSTHOG_HOST: ${{ vars.POSTHOG_HOST || 'https://eu.i.posthog.com' }}
          # ── Plan v2 — parallel hi-res photo pipeline ──────────────
          # All defaults below are OFF so the merge of this PR is a
          # no-op. Phase 2 of the plan flips PULPO_HIRES_ENABLED=1 +
          # populates PULPO_HIRES_SOURCES + PULPO_HIRES_SHADOW=1.
          # See ~/.claude/plans/cuddly-pondering-frost.md and TODOS.md
          # in this repo for the full rollout sequence.
          PULPO_HIRES_ENABLED: "0"
          PULPO_HIRES_SOURCES: ""
          PULPO_HIRES_BUDGET_S: "1500"
          PULPO_HIRES_LIMIT: "0"
          PULPO_HIRES_SHADOW: "0"
          # api/social/image.js gate. When set to "0", the endpoint
          # ignores .hires.jpg files even if they exist on disk —
          # operator-controlled cutover from shadow → live.
          PULPO_HIRES_SERVE: "0"
          # Phase 4 U3 — LLM-vision aesthetic booster. Default OFF
          # everywhere (LLM_VISION_ENABLED unset → score_aesthetic
          # returns None → picker falls back to technical-only). To
          # ship the booster in production, set repo secret
          # LLM_VISION_ENABLED=true plus one of QWEN_API_KEY /
          # SEGMIND_API_KEY / OPENAI_API_KEY / ANTHROPIC_API_KEY.
          # Daily budget cap defaults to $1.00 (in
          # automation/aesthetic_vision.py). Top-X% gating defaults to
          # 5 — see .env.example for the full knob list.
          LLM_VISION_ENABLED: ${{ secrets.LLM_VISION_ENABLED }}
          LLM_VISION_PROVIDER: ${{ secrets.LLM_VISION_PROVIDER }}
          LLM_VISION_DAILY_BUDGET_USD: ${{ secrets.LLM_VISION_DAILY_BUDGET_USD }}
          LLM_VISION_TOP_PCT: ${{ secrets.LLM_VISION_TOP_PCT }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          SEGMIND_API_KEY: ${{ secrets.SEGMIND_API_KEY }}
        run: python automation/run.py

      - name: Count canary (floor + ceiling)
        run: |
          python3 - <<'EOF'
          import json, sys, os
          floor   = int(os.environ.get("LISTING_COUNT_FLOOR",   "600"))
          ceiling = int(os.environ.get("LISTING_COUNT_CEILING", "900"))
          try:
              data = json.load(open("web/data/ranked.json"))
          except Exception as e:
              print(f"ERROR: could not read ranked.json: {e}", file=sys.stderr)
              sys.exit(1)
          n = len(data)
          if n < floor:
              print(f"CANARY FAIL: {n} listings < floor {floor}. "
                    "Not committing — stale data kept.", file=sys.stderr)
              sys.exit(1)
          if n > ceiling:
              print(f"CANARY FAIL: {n} listings > ceiling {ceiling}. "
                    "Possible parser inflation — not committing.", file=sys.stderr)
              sys.exit(1)
          print(f"CANARY OK: {n} listings in [{floor}, {ceiling}]")
          EOF

      - name: Per-type canaries (floor + classification confidence)
        # Per-type ingestion floors + classifier-confidence guard. Catches:
        #   - house/condo coverage collapsing below acceptable minimum
        #     (e.g. a scraper broadening regression silently drops built listings)
        #   - classifier going haywire and tagging the majority of listings
        #     "uncertain" (signal that broker fields or text patterns shifted)
        #
        # LOG_ONLY=true for the first 7 days so we calibrate thresholds against
        # real nightly variance before enforcing. Floors set at ~80% of current
        # production data (house=50, condo=8); ceiling on uncertain rate at 15%
        # per the original PRD spec.
        # TODO(2026-05-13): flip LOG_ONLY to false after 7-day soak window.
        env:
          LOG_ONLY:        "true"
          HOUSE_FLOOR:     "40"   # ~80% of 50 — catches broadening collapse
          CONDO_FLOOR:     "5"    # ~60% of 8 (small N — looser tolerance)
          UNCERTAIN_PCT_CEILING: "15"
        run: |
          python3 - <<'EOF'
          import json, os, sys
          from collections import Counter

          log_only = os.environ.get("LOG_ONLY", "true").lower() == "true"
          floors = {
              "house": int(os.environ.get("HOUSE_FLOOR",  "40")),
              "condo": int(os.environ.get("CONDO_FLOOR",  "5")),
          }
          uncertain_ceiling = float(os.environ.get("UNCERTAIN_PCT_CEILING", "15"))
          violations: list[str] = []

          # ── Per-type floor canary ──────────────────────────────────────
          try:
              data = json.load(open("web/data/ranked.json"))
          except Exception as e:
              print(f"ERROR: could not read ranked.json: {e}", file=sys.stderr)
              sys.exit(1)
          counts = Counter(li.get("property_type") for li in data)
          for pt, floor in floors.items():
              n = counts.get(pt, 0)
              if n < floor:
                  violations.append(
                      f"PER_TYPE_FLOOR: {pt}={n} < floor {floor} "
                      f"(scraper broadening may have regressed)"
                  )
              else:
                  print(f"  {pt:6s} {n:>4} ≥ floor {floor}")

          # ── Classifier confidence canary ───────────────────────────────
          # Reads type_classifier_log.jsonl, looks at the LAST run's rows
          # (highest ts), counts uncertain%. >ceiling means the classifier
          # is no longer confident — could be broker-side field changes,
          # weak text signals on a newly-broadened scraper, etc.
          try:
              rows = []
              with open("web/data/type_classifier_log.jsonl") as f:
                  for ln in f:
                      ln = ln.strip()
                      if ln and not ln.startswith("#"):
                          rows.append(json.loads(ln))
              if rows:
                  latest_ts = max(r["ts"] for r in rows)
                  latest = [r for r in rows if r["ts"] == latest_ts]
                  unc = sum(1 for r in latest if r.get("confidence") == "uncertain")
                  pct = (100.0 * unc) / len(latest) if latest else 0.0
                  if pct > uncertain_ceiling:
                      violations.append(
                          f"CLASSIFIER_UNCERTAIN: {pct:.1f}% > ceiling {uncertain_ceiling}% "
                          f"({unc}/{len(latest)} listings — text signals weakened?)"
                      )
                  else:
                      print(f"  classifier_uncertain {pct:.1f}% ≤ ceiling {uncertain_ceiling}%")
          except FileNotFoundError:
              print("  classifier log not found — skipping confidence canary")
          except Exception as e:
              print(f"  classifier log read error: {e}")

          if violations:
              label = "CANARY LOG" if log_only else "CANARY FAIL"
              for v in violations:
                  print(f"{label}: {v}", file=sys.stderr)
              if not log_only:
                  sys.exit(1)
          else:
              print("Per-type canaries: all OK")
          EOF

      - name: Data-quality canaries
        # Enforcing: violations fail the workflow.  Set LOG_ONLY="true" to
        # temporarily downgrade to log-only while recalibrating thresholds.
        env:
          LOG_ONLY: "false"
        run: |
          python3 - <<'EOF'
          import json, re, sys, os

          log_only = os.environ.get("LOG_ONLY", "true").lower() == "true"
          fail     = False

          try:
              data = json.load(open("web/data/ranked.json"))
          except Exception as e:
              print(f"ERROR: could not read ranked.json: {e}", file=sys.stderr)
              sys.exit(1)

          NON_SV_TITLE_RE = re.compile(
              r'(?:^(?:\w+\s+){0,4}|,\s*(?:en|in)\s+)'
              r'(guatemala|honduras|costa.?rica|nicaragua|panam[aá]|m[eé]xico|colombia)\b',
              re.IGNORECASE,
          )

          violations = []
          for r in data:
              url   = r.get("url") or ""
              title = r.get("title") or ""
              price = r.get("price_usd")
              area  = r.get("area_m2")
              ppm   = r.get("price_per_m2")

              # Country canary
              if NON_SV_TITLE_RE.search(title):
                  violations.append(f"COUNTRY: {title!r} (url={url})")

              # Area canary — 15M m² ≈ 1500 ha covers the biggest real fincas
              # we've seen; absurd values (unit-conversion slip) still trip.
              if area is not None and area > 15_000_000:
                  violations.append(f"MAX_AREA: area_m2={area} title={title!r}")

              # Price canary
              if price is not None and price > 50_000_000:
                  violations.append(f"MAX_PRICE: price_usd={price} title={title!r}")

              # $/m² range canary — agricultural land (>5 ha) trades far
              # lower than urban lots, so lower the floor for that cohort.
              ptype = (r.get("property_type") or "").lower()
              is_agri = ptype == "land" and area is not None and area > 50_000
              ppm_floor = 0.10 if is_agri else 1.0
              if ppm is not None and ppm > 0 and (ppm < ppm_floor or ppm > 5_000):
                  violations.append(f"PPM_RANGE: price_per_m2={ppm} title={title!r}")

          if violations:
              label = "CANARY LOG" if log_only else "CANARY FAIL"
              for v in violations:
                  print(f"{label}: {v}", file=sys.stderr)
              if not log_only:
                  fail = True

          if violations:
              print(f"Data-quality canaries: {len(violations)} violations "
                    f"({'logged only' if log_only else 'FAILING'})")
          else:
              print("Data-quality canaries: all OK")

          sys.exit(1 if fail else 0)
          EOF

      - name: Photo storage canary (1 GB limit; plan v2 lifted from 100 MB)
        run: |
          python3 - <<'EOF'
          import os, sys, json
          from pathlib import Path
          from datetime import datetime, timezone

          photos = Path("web/photos")
          if not photos.exists():
              print("Photo storage canary: no photos directory yet — OK")
              sys.exit(0)

          # Sum .jpg sizes, excluding _archive/
          total = sum(
              f.stat().st_size for f in photos.rglob("*.jpg")
              if "_archive" not in f.parts
          )
          mb = total / (1024 * 1024)

          # Append to size history log
          log = Path("web/data/photo_storage_size.jsonl")
          with log.open("a", encoding="utf-8") as f:
              f.write(json.dumps({"ts": datetime.now(timezone.utc).isoformat(), "mb": round(mb, 2)}) + "\n")

          # Limit lifted from 100 MB → 1024 MB (1 GB) when plan v2 landed:
          # the new hires pipeline writes to web/photos-hires/ (separate
          # canary below) but the existing pipeline now also backfills all
          # 832 listings with .hero.jpg derivatives on next run, growing
          # this directory by ~400 MB. See cuddly-pondering-frost.md.
          LIMIT_MB = 1024
          print(f"Photo storage: {mb:.1f} MB (limit {LIMIT_MB} MB)")
          if mb > LIMIT_MB:
              print(f"CANARY FAIL: photo storage exceeds {LIMIT_MB} MB — migrate to external storage", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Hires photo storage canary (1 GB limit; plan v2)
        run: |
          python3 - <<'EOF'
          import os, sys, json
          from pathlib import Path
          from datetime import datetime, timezone

          photos_hires = Path("web/photos-hires")
          if not photos_hires.exists():
              print("Hires photo storage canary: no photos-hires directory yet — OK")
              sys.exit(0)

          total = sum(f.stat().st_size for f in photos_hires.rglob("*.jpg"))
          mb = total / (1024 * 1024)

          log = Path("web/data/hires_storage_size.jsonl")
          with log.open("a", encoding="utf-8") as f:
              f.write(json.dumps({"ts": datetime.now(timezone.utc).isoformat(), "mb": round(mb, 2)}) + "\n")

          LIMIT_MB = 1024
          print(f"Hires photo storage: {mb:.1f} MB (limit {LIMIT_MB} MB)")
          if mb > LIMIT_MB:
              print(f"CANARY FAIL: hires photo storage exceeds {LIMIT_MB} MB — migrate to Vercel Blob (see TODOS.md [hires-storage])", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Hires pipeline health canary (plan v2)
        run: |
          python3 - <<'EOF'
          import os, sys, json
          from pathlib import Path

          # Only fire when hires is supposed to be running. If disabled,
          # the metrics file simply doesn't grow.
          if os.environ.get("PULPO_HIRES_ENABLED", "0") in ("", "0", "false", "no"):
              print("Hires pipeline canary: PULPO_HIRES_ENABLED is off — OK")
              sys.exit(0)

          metrics_path = Path("web/data/hires_pipeline_metrics.jsonl")
          if not metrics_path.exists():
              print("CANARY FAIL: PULPO_HIRES_ENABLED=1 but no hires_pipeline_metrics.jsonl found — the step didn't write its summary row", file=sys.stderr)
              sys.exit(1)

          # Read the last JSONL row.
          last_line = None
          with metrics_path.open("r", encoding="utf-8") as f:
              for ln in f:
                  ln = ln.strip()
                  if ln:
                      last_line = ln
          if not last_line:
              print("CANARY FAIL: hires_pipeline_metrics.jsonl exists but is empty", file=sys.stderr)
              sys.exit(1)

          try:
              row = json.loads(last_line)
          except json.JSONDecodeError as e:
              print(f"CANARY FAIL: last hires metrics row is invalid JSON: {e}", file=sys.stderr)
              sys.exit(1)

          results = row.get("results", {})
          attempted = results.get("attempted", 0)
          errored = results.get("error", 0)
          if attempted < 1:
              print(f"CANARY FAIL: hires step attempted={attempted} (silent no-op despite enabled)", file=sys.stderr)
              sys.exit(1)
          if attempted > 0 and (errored / attempted) > 0.5:
              print(f"CANARY FAIL: hires error rate {errored}/{attempted} > 50% (broker-side broken)", file=sys.stderr)
              sys.exit(1)
          print(f"Hires pipeline canary OK: attempted={attempted} ok={results.get('ok',0)} error={errored}")
          EOF

      - name: Commit refreshed data via PR
        id: commit
        env:
          GH_TOKEN: ${{ secrets.PULPO_BOT_TOKEN || github.token }}
        run: |
          git config user.name "pulpo-bot"
          git config user.email "bot@pulpo.club"
          git add web/data/ranked.json \
                  web/data/last_updated.json web/data/run_history.json \
                  web/data/parser_errors.log web/data/validation_log.jsonl \
                  samples/ranked.csv
          # Optional files — only add if they exist
          git add web/data/photo_fetch_log.jsonl 2>/dev/null || true
          git add web/data/photo_storage_size.jsonl 2>/dev/null || true
          # Plan v2 — hires pipeline outputs
          git add web/data/hires_pipeline_metrics.jsonl 2>/dev/null || true
          git add web/data/hires_storage_size.jsonl 2>/dev/null || true
          git add web/data/prd_feasibility.json 2>/dev/null || true
          git add web/data/prd_feasibility.md 2>/dev/null || true
          git add web/data/source_health_history.jsonl 2>/dev/null || true
          git add web/data/type_classifier_log.jsonl 2>/dev/null || true
          git add web/data/prices_history.json 2>/dev/null || true
          git add web/data/ai_enrichment_cache.json 2>/dev/null || true
          git add web/data/zone_medians_history.jsonl 2>/dev/null || true
          git add web/data/distance_fields_history.jsonl 2>/dev/null || true
          # DeepSeek single-call enrichment sidecar + per-event log.
          # Sidecar enables incremental enrichment across nights
          # (cache_hits=0 is currently costing ~$12/mo). Log captures
          # the actual response payload on schema_invalid failures so
          # they can be debugged without re-running the pipeline.
          git add web/data/llm_enrichment.json 2>/dev/null || true
          git add web/data/llm_enrichment_log.jsonl 2>/dev/null || true
          git add "web/photos/" 2>/dev/null || true
          # Plan v2 — hires derivatives + sidecars + quarantine markers + hash cache
          git add "web/photos-hires/" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # main is PR-protected — push to a dated branch and auto-merge a PR.
          BRANCH="chore/nightly-data-$(date -u +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          git commit -m "chore(data): nightly run $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): nightly run $(date -u +%Y-%m-%d)" \
            --body "Automated nightly data refresh. No code changes."
          # GitHub suppresses Actions triggered by a GITHUB_TOKEN-authored
          # push (anti-recursion). When PULPO_BOT_TOKEN is unset/expired
          # the data-only PR sits forever waiting on the required `pytest`
          # check that never fires (observed on PR #68). Force the dispatch
          # so the required check has a status to report against.
          gh workflow run ci.yml --ref "$BRANCH" || true
          gh workflow run tests-required.yml --ref "$BRANCH" || true
          # Try auto-merge; fall back to admin merge for protected branches
          gh pr merge "$BRANCH" --squash --delete-branch --admin || \
            gh pr merge "$BRANCH" --squash --delete-branch --auto
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        # Only runs when fresh data was actually committed.
        # Direct vercel deploy --prod: no local build needed — this is a static
        # site (buildCommand = "echo ..."). Skipping vercel build avoids the
        # 'spawn uv ENOENT' error caused by Vercel CLI trying to install Python
        # deps on the runner. VERCEL_TOKEN env var is read automatically by the
        # CLI; no --token flag needed (which was rejected for containing hyphens).
        # vercel.json ignoreCommand stops the GitHub-integration from making a
        # duplicate Blocked deploy for the same bot commit.
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes
