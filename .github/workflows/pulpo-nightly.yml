name: pulpo nightly run

# Every night at 12:00 UTC = 06:00 in El Salvador (UTC-6).
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}    # also allow manual runs

# Single-flight: a manual trigger or a backed-up cron must not race a
# still-running nightly — both would try to PR-merge dated data branches and
# the second commit would lose. cancel-in-progress kills the older run.
concurrency:
  group: pulpo-nightly
  cancel-in-progress: true

# Count canaries — both fail the workflow without committing stale data.
# FLOOR: raise if clean baseline grows. CEILING: raise if ceiling is hit
# legitimately (new large source added). The asymmetry catches both supply
# collapse (broken scraper) and phantom inflation (parser bug, dedup failure).
# Baseline after Phase 1+2 cleanup: ~740 listings.
env:
  LISTING_COUNT_FLOOR: "600"    # ~80% of 740 — catches scraper collapse
  LISTING_COUNT_CEILING: "900"  # ~120% of 740 — catches runaway parser bugs

jobs:
  run:
    runs-on: ubuntu-latest
    # Hard ceiling. A healthy run finishes in ~30 min; past 60 min something
    # is hung (typically photo download or detail-page fetch). Better to fail
    # the job and have watchdog page than burn Actions minutes silently.
    timeout-minutes: 60
    permissions:
      contents: write       # commit refreshed web/data/ back
      pull-requests: write  # gh pr create — main is PR-protected (#29's flow)
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Use PAT so the bot push can write to main without a PR.
          # PULPO_BOT_TOKEN: fine-grained PAT, Contents: write on this repo.
          # Falls back to GITHUB_TOKEN (works since branch protection no longer
          # requires a PR on main).
          token: ${{ secrets.PULPO_BOT_TOKEN || github.token }}

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          PULPO_OFFLINE: "0"
          PULPO_LIMIT: "1000"
          # Disabled sources (re-add when the blocker is resolved):
          #   kazu              — Nuxt SPA, panel API denylisted; needs headless browser
          #   realtyelsalvador  — disabled 2026-05-06 after 3 consecutive nightly
          #                       failures with HTTP 403 from Azure datacenter IPs
          #                       (PR #67's header workaround did not help).
          #                       Local runs return ~126 listings cleanly. Re-add
          #                       when we have a residential proxy, a non-Azure
          #                       runner, or rewrite to scrape HTML detail pages
          #                       which may not be WAF-gated.
          # The scraper code, registration, and tests are kept in place — only
          # the env list excludes it, so reverting is a one-line change.
          PULPO_SOURCES: "goodlife,oceanside,century21,bienesraices,remax,nexo"
          # PRD §FR-6 AI enrichment. The single-call DeepSeek flow (PRs
          # #79-81) reads DEEPSEEK_API_TOKEN. When unset, llm_enrichment
          # graceful-skips and listings get fallback templates only —
          # full pipeline still runs.
          # Provision via: gh secret set DEEPSEEK_API_TOKEN
          DEEPSEEK_API_TOKEN: ${{ secrets.DEEPSEEK_API_TOKEN }}
        run: python automation/run.py

      - name: Count canary (floor + ceiling)
        run: |
          python3 - <<'EOF'
          import json, sys, os
          floor   = int(os.environ.get("LISTING_COUNT_FLOOR",   "600"))
          ceiling = int(os.environ.get("LISTING_COUNT_CEILING", "900"))
          try:
              data = json.load(open("web/data/ranked.json"))
          except Exception as e:
              print(f"ERROR: could not read ranked.json: {e}", file=sys.stderr)
              sys.exit(1)
          n = len(data)
          if n < floor:
              print(f"CANARY FAIL: {n} listings < floor {floor}. "
                    "Not committing — stale data kept.", file=sys.stderr)
              sys.exit(1)
          if n > ceiling:
              print(f"CANARY FAIL: {n} listings > ceiling {ceiling}. "
                    "Possible parser inflation — not committing.", file=sys.stderr)
              sys.exit(1)
          print(f"CANARY OK: {n} listings in [{floor}, {ceiling}]")
          EOF

      - name: Data-quality canaries
        # TODO(2026-05-09): switch from LOG_ONLY=true to fail once canaries are
        # tuned against 7 days of real nightly runs.  Until then, violations are
        # printed but do NOT fail the workflow so we can calibrate thresholds.
        env:
          LOG_ONLY: "true"   # flip to "false" after the 7-day soak window
        run: |
          python3 - <<'EOF'
          import json, re, sys, os

          log_only = os.environ.get("LOG_ONLY", "true").lower() == "true"
          fail     = False

          try:
              data = json.load(open("web/data/ranked.json"))
          except Exception as e:
              print(f"ERROR: could not read ranked.json: {e}", file=sys.stderr)
              sys.exit(1)

          NON_SV_TITLE_RE = re.compile(
              r'(?:^(?:\w+\s+){0,4}|,\s*(?:en|in)\s+)'
              r'(guatemala|honduras|costa.?rica|nicaragua|panam[aá]|m[eé]xico|colombia)\b',
              re.IGNORECASE,
          )

          violations = []
          for r in data:
              url   = r.get("url") or ""
              title = r.get("title") or ""
              price = r.get("price_usd")
              area  = r.get("area_m2")
              ppm   = r.get("price_per_m2")

              # Country canary
              if NON_SV_TITLE_RE.search(title):
                  violations.append(f"COUNTRY: {title!r} (url={url})")

              # Area canary
              if area is not None and area > 5_000_000:
                  violations.append(f"MAX_AREA: area_m2={area} title={title!r}")

              # Price canary
              if price is not None and price > 50_000_000:
                  violations.append(f"MAX_PRICE: price_usd={price} title={title!r}")

              # $/m² range canary
              if ppm is not None and ppm > 0 and (ppm < 1 or ppm > 5_000):
                  violations.append(f"PPM_RANGE: price_per_m2={ppm} title={title!r}")

          if violations:
              label = "CANARY LOG" if log_only else "CANARY FAIL"
              for v in violations:
                  print(f"{label}: {v}", file=sys.stderr)
              if not log_only:
                  fail = True

          if violations:
              print(f"Data-quality canaries: {len(violations)} violations "
                    f"({'logged only' if log_only else 'FAILING'})")
          else:
              print("Data-quality canaries: all OK")

          sys.exit(1 if fail else 0)
          EOF

      - name: Photo storage canary (100 MB limit)
        run: |
          python3 - <<'EOF'
          import os, sys, json
          from pathlib import Path
          from datetime import datetime, timezone

          photos = Path("web/photos")
          if not photos.exists():
              print("Photo storage canary: no photos directory yet — OK")
              sys.exit(0)

          # Sum .jpg sizes, excluding _archive/
          total = sum(
              f.stat().st_size for f in photos.rglob("*.jpg")
              if "_archive" not in f.parts
          )
          mb = total / (1024 * 1024)

          # Append to size history log
          log = Path("web/data/photo_storage_size.jsonl")
          with log.open("a", encoding="utf-8") as f:
              f.write(json.dumps({"ts": datetime.now(timezone.utc).isoformat(), "mb": round(mb, 2)}) + "\n")

          print(f"Photo storage: {mb:.1f} MB (limit 100 MB)")
          if mb > 100:
              print("CANARY FAIL: photo storage exceeds 100 MB — migrate to external storage", file=sys.stderr)
              sys.exit(1)
          EOF

      - name: Commit refreshed data via PR
        id: commit
        env:
          GH_TOKEN: ${{ secrets.PULPO_BOT_TOKEN || github.token }}
        run: |
          git config user.name "pulpo-bot"
          git config user.email "bot@pulpo.club"
          git add web/data/ranked.json \
                  web/data/last_updated.json web/data/run_history.json \
                  web/data/parser_errors.log web/data/validation_log.jsonl \
                  samples/ranked.csv
          # Optional files — only add if they exist
          git add web/data/photo_fetch_log.jsonl 2>/dev/null || true
          git add web/data/photo_storage_size.jsonl 2>/dev/null || true
          git add web/data/prd_feasibility.json 2>/dev/null || true
          git add web/data/prd_feasibility.md 2>/dev/null || true
          git add web/data/source_health_history.jsonl 2>/dev/null || true
          git add web/data/type_classifier_log.jsonl 2>/dev/null || true
          git add web/data/prices_history.json 2>/dev/null || true
          git add web/data/ai_enrichment_cache.json 2>/dev/null || true
          git add web/data/zone_medians_history.jsonl 2>/dev/null || true
          git add web/data/distance_fields_history.jsonl 2>/dev/null || true
          git add "web/photos/" 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # main is PR-protected — push to a dated branch and auto-merge a PR.
          BRANCH="chore/nightly-data-$(date -u +%Y-%m-%d-%H%M)"
          git checkout -b "$BRANCH"
          git commit -m "chore(data): nightly run $(date -u +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(data): nightly run $(date -u +%Y-%m-%d)" \
            --body "Automated nightly data refresh. No code changes."
          # GitHub suppresses Actions triggered by a GITHUB_TOKEN-authored
          # push (anti-recursion). When PULPO_BOT_TOKEN is unset/expired
          # the data-only PR sits forever waiting on the required `pytest`
          # check that never fires (observed on PR #68). Force the dispatch
          # so the required check has a status to report against.
          gh workflow run ci.yml --ref "$BRANCH" || true
          gh workflow run tests-required.yml --ref "$BRANCH" || true
          # Try auto-merge; fall back to admin merge for protected branches
          gh pr merge "$BRANCH" --squash --delete-branch --admin || \
            gh pr merge "$BRANCH" --squash --delete-branch --auto
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        # Only runs when fresh data was actually committed.
        # Direct vercel deploy --prod: no local build needed — this is a static
        # site (buildCommand = "echo ..."). Skipping vercel build avoids the
        # 'spawn uv ENOENT' error caused by Vercel CLI trying to install Python
        # deps on the runner. VERCEL_TOKEN env var is read automatically by the
        # CLI; no --token flag needed (which was rejected for containing hyphens).
        # vercel.json ignoreCommand stops the GitHub-integration from making a
        # duplicate Blocked deploy for the same bot commit.
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes
