name: pulpo nightly run

# Every night at 12:00 UTC = 06:00 in El Salvador (UTC-6).
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}    # also allow manual runs

# Count floor: workflow fails (and does NOT commit) if fewer than this
# many listings are produced. Protects against a single broken scraper
# silently zeroing out the leaderboard. Tune upward as supply grows.
env:
  LISTING_COUNT_FLOOR: "50"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # commit refreshed web/data/ back
    steps:
      - uses: actions/checkout@v4
        with:
          # Use PAT so the bot push can write to main without a PR.
          # PULPO_BOT_TOKEN: fine-grained PAT, Contents: write on this repo.
          # Falls back to GITHUB_TOKEN (works since branch protection no longer
          # requires a PR on main).
          token: ${{ secrets.PULPO_BOT_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          PULPO_OFFLINE: "0"
          PULPO_LIMIT: "1000"
          # kazu: Nuxt SPA, panel API still denylisted — re-add when rewritten.
          PULPO_SOURCES: "goodlife,oceanside,century21,bienesraices,remax"
        run: python automation/run.py

      - name: Count-floor canary
        run: |
          python3 - <<'EOF'
          import json, sys, os
          floor = int(os.environ.get("LISTING_COUNT_FLOOR", "50"))
          try:
              data = json.load(open("web/data/ranked.json"))
          except Exception as e:
              print(f"ERROR: could not read ranked.json: {e}", file=sys.stderr)
              sys.exit(1)
          n = len(data)
          if n < floor:
              print(f"CANARY FAIL: {n} listings is below floor of {floor}. "
                    "Not committing — stale data kept.", file=sys.stderr)
              sys.exit(1)
          print(f"CANARY OK: {n} listings >= floor {floor}")
          EOF

      - name: Commit refreshed data
        id: commit
        run: |
          git config user.name "pulpo-bot"
          git config user.email "bot@pulpo.club"
          git add web/data/ranked.json web/data/ranked-public.json \
                  web/data/last_updated.json web/data/run_history.json \
                  samples/ranked.csv
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(data): nightly run $(date -u +%Y-%m-%d)"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Vercel
        # Only runs when fresh data was actually committed.
        # Uses vercel pull/build/deploy --prebuilt so the token is never echoed
        # and the deploy bypasses Vercel Deployment Protection (Blocked status).
        # vercel.json ignoreCommand skips the GitHub-integration auto-deploy for
        # pulpo-bot commits, eliminating the Blocked/duplicate deploy pair.
        if: steps.commit.outputs.committed == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production
          vercel build --prod
          vercel deploy --prebuilt --prod
