name: pulpo weekly run

# Wednesdays at 12:00 UTC = 06:00 in El Salvador (UTC-6).
# This is the cadence Snoop Spain uses; matches the "8 finds, every Wednesday" promise.
on:
  schedule:
    - cron: "0 12 * * 3"
  workflow_dispatch: {}    # also allow manual runs

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # commit refreshed web/data/ranked.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Set PULPO_OFFLINE=1 to skip network calls (useful while live selectors
          # are still being calibrated).
          PULPO_OFFLINE: "0"
          PULPO_LIMIT: "60"
          # kazu is a Nuxt SPA whose JSON API host (panel.kazurealestate.com)
          # is not yet on the proxy allowlist; the existing CSS-selector
          # scraper would yield zero records and clutter last_updated.json.
          # Re-add when the API is reachable AND kazu.py has been rewritten
          # as a JSON consumer.
          PULPO_SOURCES: "goodlife,oceanside"
        run: python automation/run.py

      - name: Commit refreshed data
        run: |
          git config user.name "pulpo-bot"
          git config user.email "bot@pulpo.club"
          git add web/data/ranked.json web/data/last_updated.json samples/ranked.csv
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            git commit -m "chore(data): weekly run $(date -u +%Y-%m-%d)"
            git push
          fi

      # Optional next steps (commented out — wire when newsletter + deploy land):
      #
      # - name: Deploy frontend to Vercel/Netlify
      #   run: vercel --prod --token $VERCEL_TOKEN
      #
      # - name: Send newsletter draft to Beehiiv
      #   run: python automation/build_newsletter.py
