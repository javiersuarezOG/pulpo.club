<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>pulpo.club — El Salvador Land</title>
<link rel="icon" href="../assets/logo_mark_only.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ───────────────────────────────────────────────────────── */
:root{
  --bg:#fff;--s1:#f8fafc;--s2:#f1f5f9;
  --border:#e2e8f0;--brd2:#cbd5e1;
  --text:#0f172a;--t2:#475569;--t3:#94a3b8;--t4:#cbd5e1;
  --accent:#059669;--accent-bg:rgba(5,150,105,.08);
  --amber:#f59e0b;--amber-lt:#fef3c7;
  --r:8px;--r-sm:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100%}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer}

/* ── Topbar ───────────────────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);height:50px;display:flex;align-items:center;padding:0 20px;gap:12px}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
.brand-mark{width:22px;height:22px}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.brand-name .tld{color:var(--accent)}
.tb-sep{width:1px;height:14px;background:var(--border);margin:0 4px;flex-shrink:0}
.tb-meta{font-size:12px;color:var(--t3)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:8px}

/* ── Source status badges ─────────────────────────────────────────── */
.src-strip{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:7px 20px;border-bottom:1px solid var(--border);background:var(--s1);font-size:11px}
.src-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.src-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-weight:600}
.src-badge.g{background:rgba(22,163,74,.08);color:#16a34a;border:1px solid rgba(22,163,74,.2)}
.src-badge.r{background:rgba(220,38,38,.07);color:#dc2626;border:1px solid rgba(220,38,38,.2)}
.src-nodes{display:flex;gap:4px;flex-wrap:wrap}
.src-node{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:11px;color:var(--t2);background:var(--bg);border:1px solid var(--border)}
.sdot{font-size:7px}
.sdot.g{color:#16a34a}.sdot.r{color:#dc2626}

/* ── Main layout: table + side panel side-by-side ─────────────────── */
.layout{display:flex;height:calc(100vh - 50px);overflow:hidden}
.content{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ── Filter bar ───────────────────────────────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.seg{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px;gap:2px}
.seg-btn{border:none;background:transparent;padding:5px 14px;border-radius:4px;font-size:13px;font-weight:500;color:var(--t2);transition:all .12s}
.seg-btn.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.filter-count{font-size:12px;color:var(--t3);margin-left:auto}
.filter-count strong{color:var(--t2)}

/* ── Sort bar (mobile only) ───────────────────────────────────────── */
.sort-bar{display:none;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sort-select{width:100%;padding:7px 10px;border:1px solid var(--brd2);border-radius:var(--r-sm);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}

/* ── Table wrapper ────────────────────────────────────────────────── */
.table-wrap{flex:1;overflow-y:auto;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:680px}

thead th{
  position:sticky;top:0;z-index:10;
  background:var(--s1);
  padding:9px 12px;
  font-size:11px;font-weight:600;letter-spacing:.3px;
  color:var(--t3);text-align:left;
  border-bottom:1px solid var(--border);
  white-space:nowrap;user-select:none;
}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{color:var(--t2)}
thead th.sorted{color:var(--text)}
thead th .sort-ic{font-size:10px;margin-left:3px;opacity:.35;transition:opacity .1s}
thead th.sortable:hover .sort-ic{opacity:.6}
thead th.sorted .sort-ic{opacity:1;color:var(--accent)}

th.col-title{width:36%}
th.col-zone {width:14%}
th.col-price{width:13%;text-align:right}
th.col-area {width:12%;text-align:right}
th.col-ppm  {width:11%;text-align:right}
th.col-stars{width:14%}

tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--s1)}
tbody tr.selected{background:var(--accent-bg)}
tbody td{padding:10px 12px;vertical-align:middle}

.td-title{font-size:13px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:0}/* max-width:0 triggers ellipsis in table */
.td-zone{}
.td-num{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:var(--text)}
.td-ppm{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--text)}
.td-stars{white-space:nowrap}
.zone-pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--s2);color:var(--t2);letter-spacing:.2px}
.zone-pill.tier-A{background:#dcfce7;color:#15803d}
.zone-pill.tier-B{background:#dbeafe;color:#1d4ed8}
.zone-pill.tier-C{background:#ede9fe;color:#7c3aed}
.na{color:var(--t4);font-size:12px}

/* ── Stars ────────────────────────────────────────────────────────── */
.stars-wrap{display:inline-flex;align-items:center;gap:5px}
.stars{position:relative;display:inline-block;line-height:1}
.stars-bg{color:var(--t4);font-size:13px;letter-spacing:1px}
.stars-fg{position:absolute;left:0;top:0;color:var(--amber);font-size:13px;letter-spacing:1px;overflow:hidden;white-space:nowrap}
.stars-val{font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums}

/* ── Footer ───────────────────────────────────────────────────────── */
.table-footer{padding:8px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--t3);flex-shrink:0;background:var(--s1);display:flex;align-items:center;justify-content:space-between}

/* ── Side panel ───────────────────────────────────────────────────── */
.side-panel{width:0;overflow:hidden;border-left:1px solid var(--border);transition:width .2s ease;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg)}
.side-panel.open{width:42%;min-width:300px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:13px;font-weight:600;color:var(--t2)}
.panel-close{background:none;border:none;font-size:18px;color:var(--t3);padding:2px 6px;border-radius:4px;line-height:1}
.panel-close:hover{background:var(--s2);color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:18px}
.panel-full-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.4}
.panel-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.panel-meta-item{display:flex;flex-direction:column;gap:2px}
.panel-meta-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.panel-meta-value{font-size:14px;font-weight:500;color:var(--text)}
.panel-desc{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:16px}
.panel-cta{display:block;padding:10px 18px;background:var(--accent);color:#fff;border-radius:var(--r-sm);font-size:13px;font-weight:600;text-align:center;text-decoration:none;margin-top:auto}
.panel-cta:hover{opacity:.9}
.panel-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:8px}
.panel-scores{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.score-row{display:flex;align-items:center;gap:8px;font-size:12px}
.score-name{width:64px;color:var(--t2);font-weight:500}
.score-track{flex:1;height:4px;border-radius:2px;background:var(--s3,#e2e8f0);overflow:hidden}
.score-fill{height:100%;border-radius:2px}
.score-n{width:24px;text-align:right;font-variant-numeric:tabular-nums;color:var(--t2)}
.panel-dev-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;background:var(--s2);color:var(--t2);margin-bottom:12px}

/* ── Mobile cards ─────────────────────────────────────────────────── */
.cards-wrap{display:none;flex:1;overflow-y:auto;padding:8px 12px;gap:8px;flex-direction:column}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .1s}
.card:hover{border-color:var(--brd2)}
.card.selected{border-color:var(--accent);background:var(--accent-bg)}
.card-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.4}
.card-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-row2{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--t2);font-variant-numeric:tabular-nums}
.card-ppm{font-weight:600;color:var(--text)}

/* ── Mobile overlay panel ─────────────────────────────────────────── */
.mobile-overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto}
.mobile-overlay.open{display:flex;flex-direction:column}
.mobile-overlay .panel-header{position:sticky;top:0;background:var(--bg);z-index:5}
.mobile-overlay .panel-body{flex:1}

/* ── Responsive ───────────────────────────────────────────────────── */
@media(max-width:640px){
  .layout{height:auto;flex-direction:column;overflow:visible}
  .table-wrap{display:none}
  .cards-wrap{display:flex}
  .sort-bar{display:block}
  .side-panel{display:none}
  .content{height:auto;overflow:visible}
  .src-strip{display:none}
}
</style>
</head>
<body>

<!-- Topbar -->
<nav class="topbar">
  <a class="brand" href="/">
    <svg class="brand-mark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="40" fill="#F1F5F9"/>
      <g transform="translate(100,100)">
        <g fill="none" stroke="#059669" stroke-width="13" stroke-linecap="round">
          <path d="M 0 0 Q 22 -10, 48 -36"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(45)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(90)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(135)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(180)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(225)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(270)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(315)"/>
        </g>
        <circle r="10" fill="#0F172A"/>
      </g>
    </svg>
    <span class="brand-name">pulpo<span class="tld">.club</span></span>
  </a>
  <div class="tb-sep"></div>
  <span class="tb-meta" id="meta-updated">loading…</span>
  <div class="tb-right">
    <span class="tb-meta" id="meta-count"></span>
  </div>
</nav>

<!-- Source status strip -->
<div class="src-strip" id="source-strip" style="display:none">
  <span class="src-label">Sources</span>
  <div class="src-badges">
    <span class="src-badge g">● <span id="ss-g">0</span> live</span>
    <span class="src-badge r">● <span id="ss-r">0</span> blocked</span>
  </div>
  <div class="src-nodes" id="ss-nodes"></div>
</div>

<!-- Main layout -->
<div class="layout">
  <!-- Content: filter + table + footer -->
  <div class="content">
    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="seg" role="group" aria-label="Land type filter">
        <button class="seg-btn active" data-filter="all">All</button>
        <button class="seg-btn" data-filter="open">Open land</button>
        <button class="seg-btn" data-filter="gated">Gated</button>
      </div>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <!-- Sort bar (mobile only) -->
    <div class="sort-bar">
      <select class="sort-select" id="mobile-sort">
        <option value="ppm_asc">Sort: $/m² ↑ (cheapest first)</option>
        <option value="ppm_desc">Sort: $/m² ↓</option>
        <option value="price_asc">Sort: Price ↑</option>
        <option value="price_desc">Sort: Price ↓</option>
        <option value="area_desc">Sort: Area ↓ (largest first)</option>
        <option value="area_asc">Sort: Area ↑</option>
      </select>
    </div>

    <!-- Desktop table -->
    <div class="table-wrap" id="table-wrap">
      <table id="listings-table">
        <thead>
          <tr>
            <th class="col-title">Title</th>
            <th class="col-zone">Zone</th>
            <th class="col-price sortable" data-col="price" data-def="asc">
              <div class="th-in" style="justify-content:flex-end">Price <span class="sort-ic" id="ic-price">↕</span></div>
            </th>
            <th class="col-area sortable" data-col="area" data-def="desc">
              <div class="th-in" style="justify-content:flex-end">Area <span class="sort-ic" id="ic-area">↕</span></div>
            </th>
            <th class="col-ppm sortable sorted" data-col="ppm" data-def="asc">
              <div class="th-in" style="justify-content:flex-end">$/m² <span class="sort-ic" id="ic-ppm">↑</span></div>
            </th>
            <th class="col-stars">Rating</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div class="cards-wrap" id="cards-wrap"></div>

    <!-- Footer -->
    <div class="table-footer">
      <span id="footer-count"></span>
      <span id="footer-updated" style="font-size:11px;color:var(--t4)"></span>
    </div>
  </div>

  <!-- Desktop side panel -->
  <aside class="side-panel" id="side-panel">
    <div class="panel-header">
      <span class="panel-title">Listing detail</span>
      <button class="panel-close" id="panel-close" aria-label="Close panel">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>
</div>

<!-- Mobile full-screen overlay -->
<div class="mobile-overlay" id="mobile-overlay">
  <div class="panel-header">
    <span class="panel-title">Listing detail</span>
    <button class="panel-close" id="mobile-close" aria-label="Close">×</button>
  </div>
  <div class="panel-body" id="mobile-panel-body"></div>
</div>

<script>
'use strict';
/* ── Constants ──────────────────────────────────────────────────────── */
const DATA_URL  = 'data/ranked.json';
const META_URL  = 'data/last_updated.json';

const SOURCE_NAMES = {
  oceanside:    'Oceanside El Salvador',
  goodlife:     'GoodLife El Salvador',
  century21:    'Century 21 El Salvador',
  bienesraices: 'Bienes Raíces El Salvador',
  kazu:         'Kazu Real Estate',
  remax:        'RE/MAX El Salvador',
};

const ZONE_TIER = {
  'el-tunco':'A','el-sunzal':'A','el-zonte':'A',
  'san-diego':'B','la-libertad':'B','puerto-la-libertad':'B',
  'el-cuco':'B','las-flores':'B','mizata':'B',
  'punta-mango':'C','el-espino':'C','conchagua':'C','la-union':'C',
};

/* ── State ──────────────────────────────────────────────────────────── */
let ALL_DATA   = [];
let FILTER     = 'all';       // 'all' | 'open' | 'gated'
let SORT_COL   = 'ppm';       // 'price' | 'area' | 'ppm'
let SORT_DIR   = 'asc';       // 'asc' | 'desc'
let OPEN_ID    = null;        // source_id of open listing

/* ── Formatters ─────────────────────────────────────────────────────── */
const fmtUSD  = v => v == null ? '—' : '$' + Math.round(v).toLocaleString('en-US');
const fmtPPM  = v => v == null || v <= 0 ? '—' : '$' + Math.round(v).toLocaleString('en-US');
const fmtArea = v => v == null ? '—' : Math.round(v).toLocaleString('en-US') + ' m²';
const fmtDays = d => d == null ? '—' : d === 0 ? 'Today' : d === 1 ? '1 day ago' : `${d} days ago`;
function esc(s){ return String(s ?? '').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])) }

/* ── Score → Stars ──────────────────────────────────────────────────── */
function scoreToStars(score) {
  if (score == null) return 0;
  return Math.max(0, Math.min(5, Math.round(score / 10) / 2));
}

function renderStars(score) {
  const stars = scoreToStars(score);
  const pct   = (stars / 5 * 100).toFixed(1) + '%';
  const val   = stars.toFixed(1);
  return `<span class="stars-wrap">
    <span class="stars">
      <span class="stars-bg">★★★★★</span>
      <span class="stars-fg" style="width:${pct}">★★★★★</span>
    </span>
    <span class="stars-val">${val}</span>
  </span>`;
}

/* ── Zone pill ──────────────────────────────────────────────────────── */
function zonePill(zone) {
  if (!zone) return '<span class="na">—</span>';
  const tier  = ZONE_TIER[zone] || '';
  const cls   = tier ? `tier-${tier}` : '';
  const label = zone.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  return `<span class="zone-pill ${cls}">${esc(label)}</span>`;
}

/* ── URL state ──────────────────────────────────────────────────────── */
function readURL() {
  const p = new URLSearchParams(location.search);
  FILTER   = ['all','open','gated'].includes(p.get('filter')) ? p.get('filter') : 'all';
  const s  = p.get('sort') || 'ppm_asc';
  const m  = s.match(/^(price|area|ppm)_(asc|desc)$/);
  if (m) { SORT_COL = m[1]; SORT_DIR = m[2]; }
  OPEN_ID  = p.get('listing') || null;
}

function pushURL(replace = true) {
  const p = new URLSearchParams();
  if (FILTER !== 'all')    p.set('filter',  FILTER);
  if (SORT_COL !== 'ppm' || SORT_DIR !== 'asc') p.set('sort', `${SORT_COL}_${SORT_DIR}`);
  if (OPEN_ID)             p.set('listing', OPEN_ID);
  const qs = p.toString();
  const url = qs ? `${location.pathname}?${qs}` : location.pathname;
  replace ? history.replaceState(null, '', url) : history.pushState(null, '', url);
}

/* ── Filter + Sort ──────────────────────────────────────────────────── */
function filteredRows() {
  return ALL_DATA.filter(r => {
    if (FILTER === 'open')  return !r.is_in_development;
    if (FILTER === 'gated') return  r.is_in_development;
    return true;
  });
}

function sortedRows(rows) {
  const dir = SORT_DIR === 'asc' ? 1 : -1;
  return [...rows].sort((a, b) => {
    let va, vb;
    if (SORT_COL === 'price') { va = a.price_usd ?? Infinity; vb = b.price_usd ?? Infinity; }
    else if (SORT_COL === 'area') { va = a.area_m2 ?? -Infinity; vb = b.area_m2 ?? -Infinity; }
    else { /* ppm */
      va = a.price_per_m2 && a.price_per_m2 > 0 ? a.price_per_m2 : Infinity;
      vb = b.price_per_m2 && b.price_per_m2 > 0 ? b.price_per_m2 : Infinity;
    }
    return (va - vb) * dir;
  });
}

/* ── Sort header UI ─────────────────────────────────────────────────── */
const SORT_ICONS = { asc:'↑', desc:'↓', inactive:'↕' };

function updateSortHeaders() {
  document.querySelectorAll('thead th.sortable').forEach(th => {
    const col = th.dataset.col;
    const ic  = document.getElementById(`ic-${col}`);
    if (col === SORT_COL) {
      th.classList.add('sorted');
      if (ic) ic.textContent = SORT_ICONS[SORT_DIR];
    } else {
      th.classList.remove('sorted');
      if (ic) ic.textContent = SORT_ICONS.inactive;
    }
  });
  // mobile select
  const sel = document.getElementById('mobile-sort');
  if (sel) sel.value = `${SORT_COL}_${SORT_DIR}`;
}

/* ── Detail panel content ───────────────────────────────────────────── */
function panelHTML(r) {
  const scoreColor = { value:'#059669', quality:'#2563eb', liquidity:'#7c3aed', upside:'#ea580c' };
  const scores = [
    ['Value',     r.value_score,     scoreColor.value],
    ['Quality',   r.quality_score,   scoreColor.quality],
    ['Liquidity', r.liquidity_score, scoreColor.liquidity],
    ['Upside',    r.upside_score,    scoreColor.upside],
  ].filter(([,v]) => v != null);

  const scoreBars = scores.map(([name, val, color]) => `
    <div class="score-row">
      <span class="score-name">${name}</span>
      <span class="score-track"><span class="score-fill" style="width:${val}%;background:${color}"></span></span>
      <span class="score-n">${Math.round(val)}</span>
    </div>`).join('');

  const devTag = r.is_in_development
    ? `<span class="panel-dev-tag">🏘 ${esc(r.development_name || 'Gated / Development')}</span><br>`
    : '';

  const broker = [r.broker_name, r.broker_phone, r.broker_email].filter(Boolean);
  const brokerHTML = broker.length
    ? `<div class="panel-section-label" style="margin-top:16px">Broker</div>
       <div style="font-size:13px;color:var(--t2);line-height:1.8">${broker.map(esc).join('<br>')}</div>`
    : '';

  const description = r.description
    ? `<div class="panel-section-label" style="margin-top:16px">Description</div>
       <div class="panel-desc">${esc(r.description.slice(0, 600))}${r.description.length > 600 ? '…' : ''}</div>`
    : '';

  const cta = r.url
    ? `<a class="panel-cta" href="${esc(r.url)}" target="_blank" rel="noopener" style="margin-top:20px">
         View on ${esc(SOURCE_NAMES[r.source] || r.source)} →
       </a>`
    : '';

  return `
    <div class="panel-full-title">${esc(r.title)}</div>
    ${devTag}
    <div class="panel-meta">
      <div class="panel-meta-item"><span class="panel-meta-label">Zone</span><span class="panel-meta-value">${r.zone ? r.zone.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : '—'}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Source</span><span class="panel-meta-value">${esc(SOURCE_NAMES[r.source] || r.source || '—')}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Price</span><span class="panel-meta-value">${fmtUSD(r.price_usd)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Area</span><span class="panel-meta-value">${fmtArea(r.area_m2)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">$/m²</span><span class="panel-meta-value">${fmtPPM(r.price_per_m2)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Listed</span><span class="panel-meta-value">${fmtDays(r.days_listed)}</span></div>
    </div>
    <div class="panel-section-label">Score ${renderStars(r.rank_score)}</div>
    <div class="panel-scores" style="margin-top:8px">${scoreBars}</div>
    ${description}
    ${brokerHTML}
    ${cta}`;
}

/* ── Open / close panel ─────────────────────────────────────────────── */
function openPanel(r) {
  OPEN_ID = r.source_id;
  pushURL(true);
  const html = panelHTML(r);
  if (window.innerWidth <= 640) {
    // mobile overlay
    document.getElementById('mobile-panel-body').innerHTML = html;
    document.getElementById('mobile-overlay').classList.add('open');
  } else {
    document.getElementById('panel-body').innerHTML = html;
    document.getElementById('side-panel').classList.add('open');
  }
  // highlight row
  document.querySelectorAll('tbody tr, .card').forEach(el =>
    el.classList.toggle('selected', el.dataset.id === r.source_id));
}

function closePanel() {
  OPEN_ID = null;
  pushURL(true);
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('open');
  document.querySelectorAll('tbody tr, .card').forEach(el => el.classList.remove('selected'));
}

/* ── Render ─────────────────────────────────────────────────────────── */
function renderTable(rows) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = rows.map(r => `
    <tr data-id="${esc(r.source_id)}" class="${r.source_id === OPEN_ID ? 'selected' : ''}">
      <td class="td-title">${esc(r.title)}</td>
      <td class="td-zone">${zonePill(r.zone)}</td>
      <td class="td-num">${fmtUSD(r.price_usd)}</td>
      <td class="td-num">${fmtArea(r.area_m2)}</td>
      <td class="td-ppm">${fmtPPM(r.price_per_m2)}</td>
      <td class="td-stars">${renderStars(r.rank_score)}</td>
    </tr>`).join('');

  tbody.querySelectorAll('tr').forEach((tr, i) => {
    tr.addEventListener('click', () => {
      if (OPEN_ID === rows[i].source_id) { closePanel(); return; }
      openPanel(rows[i]);
    });
  });
}

function renderCards(rows) {
  const wrap = document.getElementById('cards-wrap');
  wrap.innerHTML = rows.map(r => `
    <div class="card" data-id="${esc(r.source_id)}" style="${r.source_id === OPEN_ID ? 'border-color:var(--accent);background:var(--accent-bg)' : ''}">
      <div class="card-title">${esc(r.title)}</div>
      <div class="card-row1">
        ${zonePill(r.zone)}
        ${renderStars(r.rank_score)}
      </div>
      <div class="card-row2">
        <span>${fmtUSD(r.price_usd)}</span>
        <span>${fmtArea(r.area_m2)}</span>
        <span class="card-ppm">${fmtPPM(r.price_per_m2)}/m²</span>
      </div>
    </div>`).join('');

  wrap.querySelectorAll('.card').forEach((card, i) => {
    card.addEventListener('click', () => openPanel(rows[i]));
  });
}

function updateCounts(filtered, total) {
  const label = FILTER === 'all' ? 'All listings'
              : FILTER === 'open' ? 'Open land'
              : 'Gated / developments';
  document.getElementById('filter-count').innerHTML =
    `<strong>${filtered.toLocaleString()}</strong> of ${total.toLocaleString()} — ${label}`;
  document.getElementById('footer-count').textContent =
    `${filtered.toLocaleString()} listing${filtered !== 1 ? 's' : ''}`;
}

function render() {
  const filtered = filteredRows();
  const sorted   = sortedRows(filtered);
  updateSortHeaders();
  updateCounts(filtered.length, ALL_DATA.length);
  if (window.innerWidth > 640) renderTable(sorted);
  else renderCards(sorted);

  // Re-open panel if URL had one
  if (OPEN_ID) {
    const r = ALL_DATA.find(r => r.source_id === OPEN_ID);
    if (r) openPanel(r);
  }
}

/* ── Wire interactions ──────────────────────────────────────────────── */
function wireSegment() {
  document.querySelectorAll('.seg-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === FILTER);
    btn.addEventListener('click', () => {
      FILTER = btn.dataset.filter;
      document.querySelectorAll('.seg-btn').forEach(b => b.classList.toggle('active', b === btn));
      OPEN_ID = null;
      document.getElementById('side-panel').classList.remove('open');
      pushURL(true);
      render();
    });
  });
}

function wireSortHeaders() {
  document.querySelectorAll('thead th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (SORT_COL === col) {
        SORT_DIR = SORT_DIR === 'asc' ? 'desc' : 'asc';
      } else {
        SORT_COL = col;
        SORT_DIR = th.dataset.def || 'asc';
      }
      pushURL(true);
      render();
    });
  });
}

function wireMobileSort() {
  const sel = document.getElementById('mobile-sort');
  sel.value = `${SORT_COL}_${SORT_DIR}`;
  sel.addEventListener('change', () => {
    const m = sel.value.match(/^(price|area|ppm)_(asc|desc)$/);
    if (m) { SORT_COL = m[1]; SORT_DIR = m[2]; }
    pushURL(true);
    render();
  });
}

function wireClose() {
  document.getElementById('panel-close').addEventListener('click', closePanel);
  document.getElementById('mobile-close').addEventListener('click', closePanel);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
  // click outside panel
  document.getElementById('table-wrap')?.addEventListener('click', e => {
    if (!e.target.closest('tr') && OPEN_ID) closePanel();
  });
}

// Re-render on resize breakpoint crossing
let _lastMobile = window.innerWidth <= 640;
window.addEventListener('resize', () => {
  const mobile = window.innerWidth <= 640;
  if (mobile !== _lastMobile) { _lastMobile = mobile; render(); }
});

/* ── Source status strip ────────────────────────────────────────────── */
async function loadMeta() {
  try {
    const meta = await fetch(META_URL, { cache: 'no-store' }).then(r => r.json());
    const stamp = new Date(meta.last_updated).toLocaleString('en-US', { dateStyle:'medium', timeStyle:'short' });
    document.getElementById('meta-updated').textContent = 'Updated ' + stamp;
    document.getElementById('footer-updated').textContent = stamp;
    document.getElementById('meta-count').textContent = `${meta.total_listings || ALL_DATA.length} listings`;

    const st = meta.source_status || {};
    const srcs = meta.sources || Object.keys(st);
    let g = 0, r = 0;
    Object.values(st).forEach(v => v === 'green' ? g++ : r++);
    document.getElementById('ss-g').textContent = g;
    document.getElementById('ss-r').textContent = r;
    document.getElementById('ss-nodes').innerHTML = srcs.map(s => {
      const sv = st[s] || 'red';
      return `<span class="src-node"><span class="sdot ${sv[0]}">●</span>${SOURCE_NAMES[s] || s}</span>`;
    }).join('');
    document.getElementById('source-strip').style.display = 'flex';
  } catch {}
}

/* ── Init ───────────────────────────────────────────────────────────── */
async function init() {
  readURL();

  try {
    ALL_DATA = await fetch(DATA_URL, { cache: 'no-store' }).then(r => r.json());
  } catch (e) {
    document.getElementById('table-body').innerHTML =
      '<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--t3)">Failed to load data.</td></tr>';
    return;
  }

  wireSegment();
  wireSortHeaders();
  wireMobileSort();
  wireClose();
  render();
  loadMeta();
}

init();
</script>
</body>
</html>
