<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>pulpo.club — El Salvador Land</title>
<link rel="icon" href="../assets/logo_mark_only.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ─────────────────────────────────────────── */
:root{
  --bg:#fff;--s1:#f8fafc;--s2:#f1f5f9;--s3:#e2e8f0;
  --border:#e2e8f0;--brd2:#cbd5e1;
  --text:#0f172a;--t2:#475569;--t3:#94a3b8;--t4:#cbd5e1;
  --accent:#059669;--accent-bg:rgba(5,150,105,.08);
  --amber:#f59e0b;--warn:#d97706;
  --r:8px;--r-sm:5px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100%}
a{color:var(--accent);text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── Topbar ─────────────────────────────────────────── */
.topbar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);height:50px;display:flex;align-items:center;padding:0 20px;gap:12px}
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;text-decoration:none}
.brand-mark{width:22px;height:22px}
.brand-name{font-size:14px;font-weight:700;letter-spacing:-.2px;color:var(--text)}
.brand-name .tld{color:var(--accent)}
.tb-sep{width:1px;height:14px;background:var(--border);margin:0 4px;flex-shrink:0}
.tb-meta{font-size:12px;color:var(--t3)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.src-live{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--t2)}
.src-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;flex-shrink:0}

/* ── Main layout ────────────────────────────────────── */
.layout{display:flex;height:calc(100vh - 50px);overflow:hidden}
.content{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}

/* ── Open/Gated filter bar ──────────────────────────── */
.filter-bar{display:flex;align-items:center;gap:10px;padding:10px 20px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.seg{display:flex;background:var(--s2);border:1px solid var(--border);border-radius:var(--r-sm);padding:2px;gap:2px}
.seg-btn{background:transparent;padding:5px 14px;border-radius:4px;font-size:13px;font-weight:500;color:var(--t2);transition:all .12s}
.seg-btn.active{background:#fff;color:var(--text);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.filter-count{font-size:12px;color:var(--t3);margin-left:auto;white-space:nowrap}
.filter-count strong{color:var(--t2)}

/* ── Zone filter block ──────────────────────────────── */
.zone-filter{flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);padding:4px 0}
.zf-group{display:grid;grid-template-columns:120px 1fr 54px;align-items:start;padding:3px 20px;gap:6px;transition:background .1s}
.zf-group:hover{background:var(--s1)}
.zf-group.active{background:var(--s2)}
.zg-label{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.2px;padding-top:5px;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none}
.zf-group.active .zg-label{color:var(--text)}
.zg-pills{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
.zg-count{font-size:11px;color:var(--t3);text-align:right;padding-top:5px;font-variant-numeric:tabular-nums;white-space:nowrap}
.zf-group.active .zg-count{color:var(--text);font-weight:600}

/* ── Zone pills ─────────────────────────────────────── */
.zone-pill{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.2px;white-space:nowrap;transition:outline .1s}
.zone-pill.clickable{cursor:pointer}
.zone-pill.pill-active{outline:2px solid var(--text);outline-offset:1px}
.zone-pill--nozone{background:#F1EFE8;color:#2C2C2A}

/* ── Mobile sort bar ────────────────────────────────── */
.sort-bar{display:none;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sort-select{width:100%;padding:7px 10px;border:1px solid var(--brd2);border-radius:var(--r-sm);font-size:13px;font-family:inherit;background:var(--bg);color:var(--text)}

/* ── Table ──────────────────────────────────────────── */
.table-wrap{flex:1;overflow-y:auto;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:560px}
thead th{position:sticky;top:0;z-index:10;background:var(--s1);padding:9px 12px;font-size:11px;font-weight:600;letter-spacing:.3px;color:var(--t3);text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
thead th.sortable{cursor:pointer}
thead th.sortable:hover{color:var(--t2)}
thead th.sorted{color:var(--text)}
thead th .sort-ic{font-size:10px;margin-left:3px;opacity:.35;transition:opacity .1s}
thead th.sortable:hover .sort-ic{opacity:.6}
thead th.sorted .sort-ic{opacity:1;color:var(--accent)}
th.col-zone {width:22%}
th.col-price{width:19%;text-align:right}
th.col-area {width:18%;text-align:right}
th.col-ppm  {width:12%;text-align:right}
th.col-stars{width:24%}
th.col-chev {width:44px;text-align:center;padding:0}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .08s}
tbody tr:hover{background:var(--s1)}
tbody tr.selected{background:var(--accent-bg)}
tbody td{padding:10px 12px;vertical-align:middle}
.td-num{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;color:var(--text)}
.td-ppm{text-align:right;font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--text)}
.td-stars{white-space:nowrap}
.td-chev{text-align:center;color:var(--t4);font-size:16px;line-height:1;padding:0 8px}

/* ── Stars ──────────────────────────────────────────── */
.stars-wrap{display:inline-flex;align-items:center;gap:5px}
.stars{position:relative;display:inline-block;line-height:1}
.stars-bg{color:var(--t4);font-size:13px;letter-spacing:1px}
.stars-fg{position:absolute;left:0;top:0;color:var(--amber);font-size:13px;letter-spacing:1px;overflow:hidden;white-space:nowrap}
.stars-val{font-size:11px;color:var(--t3);font-variant-numeric:tabular-nums}

/* ── Footer ─────────────────────────────────────────── */
.table-footer{padding:8px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--t3);flex-shrink:0;background:var(--s1);display:flex;align-items:center;justify-content:space-between}

/* ── Side panel ─────────────────────────────────────── */
.side-panel{width:0;overflow:hidden;border-left:1px solid var(--border);transition:width .2s ease;flex-shrink:0;display:flex;flex-direction:column;background:var(--bg)}
.side-panel.open{width:42%;min-width:300px}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:13px;font-weight:600;color:var(--t2)}
.panel-close{font-size:18px;color:var(--t3);padding:2px 6px;border-radius:4px;line-height:1}
.panel-close:hover{background:var(--s2);color:var(--text)}
.panel-body{flex:1;overflow-y:auto;padding:18px}
.panel-full-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.4;display:flex;align-items:flex-start;gap:8px}
.warn-icon{flex-shrink:0;color:var(--warn);font-size:14px;position:relative;cursor:help;margin-top:2px}
.warn-tooltip{display:none;position:absolute;top:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:11px;padding:6px 10px;border-radius:6px;z-index:100;max-width:260px;white-space:normal;text-align:left;line-height:1.4;width:max-content}
.warn-icon:hover .warn-tooltip{display:block}
.panel-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.panel-meta-item{display:flex;flex-direction:column;gap:2px}
.panel-meta-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)}
.panel-meta-value{font-size:14px;font-weight:500;color:var(--text)}
.panel-desc{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:16px}
.panel-cta{display:block;padding:10px 18px;background:var(--accent);color:#fff;border-radius:var(--r-sm);font-size:13px;font-weight:600;text-align:center;text-decoration:none;margin-top:auto}
.panel-cta:hover{opacity:.9}
.panel-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:8px}
.panel-scores{display:flex;flex-direction:column;gap:5px;margin-bottom:16px}
.score-row{display:flex;align-items:center;gap:8px;font-size:12px}
.score-name{width:64px;color:var(--t2);font-weight:500}
.score-track{flex:1;height:4px;border-radius:2px;background:var(--s3);overflow:hidden}
.score-fill{height:100%;border-radius:2px}
.score-n{width:24px;text-align:right;font-variant-numeric:tabular-nums;color:var(--t2)}
.panel-dev-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;background:var(--s2);color:var(--t2);margin-bottom:12px}

/* ── Mobile cards ───────────────────────────────────── */
.cards-wrap{display:none;flex:1;overflow-y:auto;padding:8px 12px;gap:8px;flex-direction:column}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;transition:border-color .1s}
.card:hover{border-color:var(--brd2)}
.card.selected{border-color:var(--accent);background:var(--accent-bg)}
.card-zone-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-row2{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--t2);font-variant-numeric:tabular-nums}
.card-ppm{font-weight:600;color:var(--text)}

/* ── Mobile overlay panel ───────────────────────────── */
.mobile-overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);overflow-y:auto}
.mobile-overlay.open{display:flex;flex-direction:column}
.mobile-overlay .panel-header{position:sticky;top:0;background:var(--bg);z-index:5}
.mobile-overlay .panel-body{flex:1}

/* ── Responsive ─────────────────────────────────────── */
@media(max-width:640px){
  .layout{height:auto;flex-direction:column;overflow:visible}
  .table-wrap{display:none}
  .cards-wrap{display:flex}
  .sort-bar{display:block}
  .side-panel{display:none}
  .content{height:auto;overflow:visible}
  .zf-group{grid-template-columns:1fr auto;grid-template-rows:auto auto;gap:2px 8px}
  .zg-label{grid-column:1;grid-row:1}
  .zg-count{grid-column:2;grid-row:1}
  .zg-pills{grid-column:1/-1;grid-row:2;padding-bottom:4px}
}
</style>
</head>
<body>

<!-- Topbar -->
<nav class="topbar">
  <a class="brand" href="/">
    <svg class="brand-mark" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <rect width="200" height="200" rx="40" fill="#F1F5F9"/>
      <g transform="translate(100,100)">
        <g fill="none" stroke="#059669" stroke-width="13" stroke-linecap="round">
          <path d="M 0 0 Q 22 -10, 48 -36"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(45)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(90)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(135)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(180)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(225)"/>
          <path d="M 0 0 Q 22 -10, 48 -36" transform="rotate(270)"/>

        <circle r="10" fill="#0F172A"/>

    <span class="src-live" id="src-live" style="display:none">

<!-- Main layout -->
<div class="layout">
  <div class="content">

    <!-- Open/Gated filter -->
    <div class="filter-bar">
      <div class="seg" role="group" aria-label="Land type filter">
        <button class="seg-btn active" data-filter="all">All</button>
        <button class="seg-btn" data-filter="open">Open land</button>
        <button class="seg-btn" data-filter="gated">Gated</button>
      </div>
      <span class="filter-count" id="filter-count"></span>
    </div>

    <!-- Zone filter -->
    <div class="zone-filter" id="zone-filter"></div>

    <!-- Mobile sort bar -->
    <div class="sort-bar">
      <select class="sort-select" id="mobile-sort">
        <option value="ppm_asc">Sort: $/m² ↑ (best value first)</option>
        <option value="ppm_desc">Sort: $/m² ↓</option>
        <option value="price_asc">Sort: Price ↑</option>
        <option value="price_desc">Sort: Price ↓</option>
        <option value="area_desc">Sort: Area ↓ (largest first)</option>
        <option value="area_asc">Sort: Area ↑</option>
        <option value="stars_desc">Sort: Rating ↓ (best first)</option>
        <option value="stars_asc">Sort: Rating ↑</option>
        <option value="zone_asc">Sort: Zone A→Z</option>
        <option value="zone_desc">Sort: Zone Z→A</option>
      </select>
    </div>

    <!-- Desktop table -->
    <div class="table-wrap" id="table-wrap">
      <table id="listings-table">
        <thead>
          <tr>
            <th class="col-zone sortable" data-col="zone" data-def="asc">
              Zone <span class="sort-ic" id="ic-zone">↕</span>
            </th>
            <th class="col-price sortable" data-col="price" data-def="asc">
              <div style="display:flex;justify-content:flex-end;gap:3px">Price <span class="sort-ic" id="ic-price">↕</span></div>
            </th>
            <th class="col-area sortable" data-col="area" data-def="desc">
              <div style="display:flex;justify-content:flex-end;gap:3px">Area <span class="sort-ic" id="ic-area">↕</span></div>
            </th>
            <th class="col-ppm sortable sorted" data-col="ppm" data-def="asc">
              <div style="display:flex;justify-content:flex-end;gap:3px">$/m² <span class="sort-ic" id="ic-ppm">↑</span></div>
            </th>
            <th class="col-stars sortable" data-col="stars" data-def="desc">
              Rating <span class="sort-ic" id="ic-stars">↕</span>

    <!-- Mobile cards -->
    <div class="cards-wrap" id="cards-wrap"></div>

    <!-- Footer -->
    <div class="table-footer">
      <span id="footer-count"></span>
      <span id="footer-updated" style="font-size:11px;color:var(--t4)"></span>
    </div>
  </div>

  <!-- Desktop side panel -->
  <aside class="side-panel" id="side-panel">
    <div class="panel-header">
      <span class="panel-title">Listing detail</span>
      <button class="panel-close" id="panel-close" aria-label="Close panel">×</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </aside>
</div>

<!-- Mobile full-screen overlay -->
<div class="mobile-overlay" id="mobile-overlay">
  <div class="panel-header">
    <span class="panel-title">Listing detail</span>
    <button class="panel-close" id="mobile-close" aria-label="Close">×</button>
  </div>
  <div class="panel-body" id="mobile-panel-body"></div>
</div>

<script>
'use strict';
const DATA_URL = 'data/ranked.json';
const META_URL = 'data/last_updated.json';

const SOURCE_NAMES = {
  oceanside:'Oceanside El Salvador', goodlife:'GoodLife El Salvador',
  century21:'Century 21 El Salvador', bienesraices:'Bienes Raíces El Salvador',
  kazu:'Kazu Real Estate', remax:'RE/MAX El Salvador',
};

/* ── Zone groups (mirrors automation/zones.py) ───────── */
const ZONE_GROUPS = {
  'surf-city-1':  {label:'Surf City 1',    zones:['el-tunco','el-sunzal','el-zonte','san-diego','mizata']},
  'surf-city-2':  {label:'Surf City 2',    zones:['el-cuco','las-flores','punta-mango','el-espino','conchagua']},
  'other-coastal':{label:'Other coastal',  zones:['la-libertad','puerto-la-libertad','jiquilisco','tamanique','acajutla','costa-del-sol','san-luis-la-herradura']},
  'inland':       {label:'Inland',         zones:['la-union','san-salvador','ahuachapan','santa-ana','sonsonate','chalatenango','la-paz','tonacatepeque','soyapango','mejicanos','nejapa','apopa','san-martin','ilopango','zacatecoluca','olocuilta','nueva-concepcion','cojutepeque','suchitoto','chalchuapa','santa-tecla','izalco','armenia','ataco','apaneca','tacuba','juayua','san-jose-villanueva','nahuizalco','tejutla','sesori','usulutan','san-miguel']},
};
const ZONE_GROUP_ORDER = ['surf-city-1','surf-city-2','other-coastal','inland'];

// Build zone → group reverse lookup
const ZONE_TO_GROUP = {};
for (const [gk,g] of Object.entries(ZONE_GROUPS))
  for (const z of g.zones) ZONE_TO_GROUP[z] = gk;

/* ── Zone colors ─────────────────────────────────────── */
const ZONE_PALETTE = [
  {bg:'#E1F5EE',fg:'#085041'}, // 0 teal
  {bg:'#E6F1FB',fg:'#0C447C'}, // 1 blue
  {bg:'#EAF3DE',fg:'#27500A'}, // 2 green
  {bg:'#FAECE7',fg:'#712B13'}, // 3 coral
  {bg:'#FAEEDA',fg:'#633806'}, // 4 amber
  {bg:'#EEEDFE',fg:'#3C3489'}, // 5 purple
  {bg:'#FBEAF0',fg:'#72243E'}, // 6 pink
  {bg:'#F1EFE8',fg:'#2C2C2A'}, // 7 gray
];
const ZONE_COLORS = {
  'el-tunco':ZONE_PALETTE[3],'el-sunzal':ZONE_PALETTE[4],'el-zonte':ZONE_PALETTE[6],
  'san-diego':ZONE_PALETTE[1],'mizata':ZONE_PALETTE[7],'el-cuco':ZONE_PALETTE[3],
  'las-flores':ZONE_PALETTE[6],'punta-mango':ZONE_PALETTE[4],'el-espino':ZONE_PALETTE[0],
  'jiquilisco':ZONE_PALETTE[1],'tamanique':ZONE_PALETTE[0],'conchagua':ZONE_PALETTE[5],
  'ahuachapan':ZONE_PALETTE[4],'la-union':ZONE_PALETTE[1],'san-salvador':ZONE_PALETTE[7],
  'la-libertad':ZONE_PALETTE[2],'puerto-la-libertad':ZONE_PALETTE[2],
  'santa-ana':ZONE_PALETTE[4],'sonsonate':ZONE_PALETTE[0],'costa-del-sol':ZONE_PALETTE[2],
};

function _hashZone(z) {
  let h = 5381;
  for (let i = 0; i < z.length; i++) h = ((h << 5) + h + z.charCodeAt(i)) >>> 0;
  return h % ZONE_PALETTE.length;
}
function zoneColor(z) { return ZONE_COLORS[z] || ZONE_PALETTE[_hashZone(z)]; }

/* ── State ───────────────────────────────────────────── */
let ALL_DATA = [], FILTER = 'all', ZONE_F = null;
let SORT_COL = 'ppm', SORT_DIR = 'asc', OPEN_ID = null;

/* ── Helpers ─────────────────────────────────────────── */
const fmtUSD  = v => v==null ? '—' : '$'+Math.round(v).toLocaleString('en-US');
const fmtPPM  = v => (v==null||v<=0) ? '—' : '$'+Math.round(v).toLocaleString('en-US');
const fmtArea = v => v==null ? '—' : Math.round(v).toLocaleString('en-US')+' m²';
const fmtDays = d => d==null ? '—' : d===0 ? 'Today' : d===1 ? '1 day ago' : `${d} days ago`;
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])) }
function zoneLabel(z){ return z ? z.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()) : 'No zone'; }
const isNoZone = r => !r.zone;

function zonePillHTML(r) {
  if (r.zone) {
    const {bg,fg} = zoneColor(r.zone);
    const label = zoneLabel(r.zone);
    return `<span class="zone-pill" style="background:${bg};color:${fg}">${esc(label)}</span>`;
  }
  if (r.department) {
    const slug = r.department.toLowerCase().replace(/\s+/g,'-');
    const {bg,fg} = zoneColor(slug);
    return `<span class="zone-pill" style="background:${bg};color:${fg};opacity:.85">${esc(r.department)}</span>`;
  }
  return `<span class="zone-pill zone-pill--nozone">No zone</span>`;
}

/* ── Score → Stars ───────────────────────────────────── */
function scoreToStars(s) {
  if (s==null) return 0;
  return Math.max(0,Math.min(5,Math.round(s/10)/2));
}
function renderStars(score) {
  const stars = scoreToStars(score);
  const pct = (stars/5*100).toFixed(1)+'%';
  return `<span class="stars-wrap"><span class="stars"><span class="stars-bg">★★★★★</span><span class="stars-fg" style="width:${pct}">★★★★★</span></span><span class="stars-val">${stars.toFixed(1)}</span></span>`;
}

/* ── URL state ───────────────────────────────────────── */
function readURL() {
  const p = new URLSearchParams(location.search);
  FILTER = ['all','open','gated'].includes(p.get('filter')) ? p.get('filter') : 'all';
  const s = p.get('sort')||'ppm_asc';
  const m = s.match(/^(zone|price|area|ppm|stars)_(asc|desc)$/);
  if (m) { SORT_COL=m[1]; SORT_DIR=m[2]; }
  const zg=p.get('zone_group'), z=p.get('zone');
  if (zg==='no-zone') ZONE_F={type:'no-zone',value:'no-zone'};
  else if (zg&&ZONE_GROUPS[zg]) ZONE_F={type:'group',value:zg};
  else if (z) ZONE_F={type:'zone',value:z};
  else ZONE_F=null;
  OPEN_ID=p.get('listing')||null;
}
function pushURL(replace=true) {
  const p=new URLSearchParams();
  if (FILTER!=='all') p.set('filter',FILTER);
  if (SORT_COL!=='ppm'||SORT_DIR!=='asc') p.set('sort',`${SORT_COL}_${SORT_DIR}`);
  if (ZONE_F) {
    if (ZONE_F.type==='no-zone') p.set('zone_group','no-zone');
    else if (ZONE_F.type==='group') p.set('zone_group',ZONE_F.value);
    else p.set('zone',ZONE_F.value);
  }
  if (OPEN_ID) p.set('listing',OPEN_ID);
  const qs=p.toString();
  const url=qs?`${location.pathname}?${qs}`:location.pathname;
  replace?history.replaceState(null,'',url):history.pushState(null,'',url);
}

/* ── Filter + Sort ───────────────────────────────────── */
function filteredRows() {
  return ALL_DATA.filter(r => {
    if (FILTER==='open'  && r.is_in_development)  return false;
    if (FILTER==='gated' && !r.is_in_development) return false;
    if (!ZONE_F) return true;
    if (ZONE_F.type==='no-zone') return isNoZone(r);
    if (ZONE_F.type==='zone')    return r.zone===ZONE_F.value;
    if (ZONE_F.type==='group') {
      const zones=ZONE_GROUPS[ZONE_F.value]?.zones||[];
      return zones.includes(r.zone);
    }
    return true;
  });
}
function sortedRows(rows) {
  const dir=SORT_DIR==='asc'?1:-1, nil=SORT_DIR==='asc'?Infinity:-Infinity;
  return [...rows].sort((a,b) => {
    if (SORT_COL==='zone') {
      // No-zone → end; dept-only → before pure no-zone; resolved zone → normal
      const az=a.zone||(a.department?'￾'+a.department:'￿');
      const bz=b.zone||(b.department?'￾'+b.department:'￿');
      return az.localeCompare(bz,'es')*dir;
    }
    let va,vb;
    if      (SORT_COL==='price') {va=a.price_usd  ??nil;vb=b.price_usd  ??nil;}
    else if (SORT_COL==='area')  {va=a.area_m2    ??nil;vb=b.area_m2    ??nil;}
    else if (SORT_COL==='stars') {va=a.rank_score ??nil;vb=b.rank_score ??nil;}
    else {va=(a.price_per_m2>0)?a.price_per_m2:nil;vb=(b.price_per_m2>0)?b.price_per_m2:nil;}
    return (va-vb)*dir;
  });
}

/* ── Sort header UI ──────────────────────────────────── */
function updateSortHeaders() {
  document.querySelectorAll('thead th.sortable').forEach(th => {
    const col=th.dataset.col, ic=document.getElementById(`ic-${col}`);
    if (col===SORT_COL) { th.classList.add('sorted'); if(ic)ic.textContent=SORT_DIR==='asc'?'↑':'↓'; }
    else { th.classList.remove('sorted'); if(ic)ic.textContent='↕'; }
  });
  const sel=document.getElementById('mobile-sort');
  if (sel) sel.value=`${SORT_COL}_${SORT_DIR}`;
}

/* ── Zone filter render ──────────────────────────────── */
function buildZoneFilter(data) {
  const groupCounts={}, zoneCounts={};
  let noZoneCount=0;
  for (const r of data) {
    if (isNoZone(r)) { noZoneCount++; continue; }
    const z=r.zone; if(!z) continue;
    zoneCounts[z]=(zoneCounts[z]||0)+1;
    const gk=ZONE_TO_GROUP[z];
    if(gk) groupCounts[gk]=(groupCounts[gk]||0)+1;
  }
  const wrap=document.getElementById('zone-filter');
  let html='';
  for (const gk of ZONE_GROUP_ORDER) {
    const g=ZONE_GROUPS[gk], cnt=groupCounts[gk]||0;
    if(!cnt) continue;
    const isGA=ZONE_F?.type==='group'&&ZONE_F?.value===gk;
    const pills=g.zones.filter(z=>zoneCounts[z]).map(z=>{
      const {bg,fg}=zoneColor(z), label=zoneLabel(z);
      const active=ZONE_F?.type==='zone'&&ZONE_F?.value===z?' pill-active':'';
      return `<span class="zone-pill clickable${active}" data-zone="${esc(z)}" style="background:${bg};color:${fg}">${esc(label)}</span>`;
    }).join('');
    html+=`<div class="zf-group${isGA?' active':''}" data-group="${esc(gk)}">
      <span class="zg-label" data-group="${esc(gk)}">${esc(g.label)}</span>
      <div class="zg-pills">${pills}</div>
      <span class="zg-count">${cnt.toLocaleString('en-US')}</span>
    </div>`;
  }
  // Synthetic "No zone" group
  const isNZ=ZONE_F?.type==='no-zone';
  const nzRing=isNZ?' pill-active':'';
  html+=`<div class="zf-group${isNZ?' active':''}" data-group="no-zone">
    <span class="zg-label" data-group="no-zone">No zone</span>
    <div class="zg-pills"><span class="zone-pill zone-pill--nozone clickable${nzRing}" data-zone="__no-zone__">No zone</span></div>
    <span class="zg-count">${noZoneCount.toLocaleString('en-US')}</span>
  </div>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll('.zg-label').forEach(el=>el.addEventListener('click',()=>toggleGroupFilter(el.dataset.group)));
  wrap.querySelectorAll('.zone-pill.clickable').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const z=el.dataset.zone;
    if(z==='__no-zone__') toggleGroupFilter('no-zone');
    else toggleZoneFilter(z);
  }));
}
function toggleGroupFilter(gk) {
  ZONE_F=(gk==='no-zone')
    ? (ZONE_F?.type==='no-zone' ? null : {type:'no-zone',value:'no-zone'})
    : (ZONE_F?.type==='group'&&ZONE_F?.value===gk ? null : {type:'group',value:gk});
  OPEN_ID=null;
  document.getElementById('side-panel').classList.remove('open');
  pushURL(true); render();
}
function toggleZoneFilter(z) {
  ZONE_F=(ZONE_F?.type==='zone'&&ZONE_F?.value===z) ? null : {type:'zone',value:z};
  OPEN_ID=null;
  document.getElementById('side-panel').classList.remove('open');
  pushURL(true); render();
}

/* ── Side panel ──────────────────────────────────────── */
function panelHTML(r) {
  const scoreColor={value:'#059669',quality:'#2563eb',liquidity:'#7c3aed',upside:'#ea580c'};
  const scores=[['Value',r.value_score,scoreColor.value],['Quality',r.quality_score,scoreColor.quality],
    ['Liquidity',r.liquidity_score,scoreColor.liquidity],['Upside',r.upside_score,scoreColor.upside]]
    .filter(([,v])=>v!=null);
  const scoreBars=scores.map(([name,val,color])=>
    `<div class="score-row"><span class="score-name">${name}</span><span class="score-track"><span class="score-fill" style="width:${val}%;background:${color}"></span></span><span class="score-n">${Math.round(val)}</span></div>`).join('');
  const warnings=r.validation_warnings||[];
  const warnHTML=warnings.length
    ? `<span class="warn-icon" title="Validation warnings">⚠<span class="warn-tooltip">${warnings.map(esc).join('<br>')}</span></span>`
    : '';
  const zoneDisplay=r.zone ? zoneLabel(r.zone) : (r.department||'No zone');
  const devTag=r.is_in_development
    ? `<span class="panel-dev-tag">🏘 ${esc(r.development_name||'Gated / Development')}</span><br>` : '';
  const broker=[r.broker_name,r.broker_phone,r.broker_email].filter(Boolean);
  const brokerHTML=broker.length
    ? `<div class="panel-section-label" style="margin-top:16px">Broker</div><div style="font-size:13px;color:var(--t2);line-height:1.8">${broker.map(esc).join('<br>')}</div>` : '';
  const description=r.description
    ? `<div class="panel-section-label" style="margin-top:16px">Description</div><div class="panel-desc">${esc(r.description.slice(0,600))}${r.description.length>600?'…':''}</div>` : '';
  const cta=r.url
    ? `<a class="panel-cta" href="${esc(r.url)}" target="_blank" rel="noopener" style="margin-top:20px">View on ${esc(SOURCE_NAMES[r.source]||r.source)} →</a>` : '';
  return `<div class="panel-full-title">${esc(r.title)}${warnHTML}</div>
    ${devTag}
    <div class="panel-meta">
      <div class="panel-meta-item"><span class="panel-meta-label">Zone</span><span class="panel-meta-value">${esc(zoneDisplay)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Source</span><span class="panel-meta-value">${esc(SOURCE_NAMES[r.source]||r.source||'—')}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Price</span><span class="panel-meta-value">${fmtUSD(r.price_usd)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Area</span><span class="panel-meta-value">${fmtArea(r.area_m2)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">$/m²</span><span class="panel-meta-value">${fmtPPM(r.price_per_m2)}</span></div>
      <div class="panel-meta-item"><span class="panel-meta-label">Listed</span><span class="panel-meta-value">${fmtDays(r.days_listed)}</span></div>
    </div>
    <div class="panel-section-label">Score ${renderStars(r.rank_score)}</div>
    <div class="panel-scores" style="margin-top:8px">${scoreBars}</div>
    ${description}${brokerHTML}${cta}`;
}
function openPanel(r) {
  OPEN_ID=r.source_id; pushURL(true);
  const html=panelHTML(r);
  if(window.innerWidth<=640){
    document.getElementById('mobile-panel-body').innerHTML=html;
    document.getElementById('mobile-overlay').classList.add('open');
  } else {
    document.getElementById('panel-body').innerHTML=html;
    document.getElementById('side-panel').classList.add('open');
  }
  document.querySelectorAll('tbody tr,.card').forEach(el=>
    el.classList.toggle('selected',el.dataset.id===r.source_id));
}
function closePanel() {
  OPEN_ID=null; pushURL(true);
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('mobile-overlay').classList.remove('open');
  document.querySelectorAll('tbody tr,.card').forEach(el=>el.classList.remove('selected'));
}

/* ── Render ──────────────────────────────────────────── */
function renderTable(rows) {
  const tbody=document.getElementById('table-body');
  tbody.innerHTML=rows.map(r=>`
    <tr data-id="${esc(r.source_id)}" class="${r.source_id===OPEN_ID?'selected':''}">
      <td>${zonePillHTML(r)}</td>
      <td class="td-num">${fmtUSD(r.price_usd)}</td>
      <td class="td-num">${fmtArea(r.area_m2)}</td>
      <td class="td-ppm">${fmtPPM(r.price_per_m2)}</td>
      <td class="td-stars">${renderStars(r.rank_score)}</td>
      <td class="td-chev">›</td>
    </tr>`).join('');
  tbody.querySelectorAll('tr').forEach((tr,i)=>tr.addEventListener('click',()=>{
    if(OPEN_ID===rows[i].source_id){closePanel();return;}
    openPanel(rows[i]);
  }));
}
function renderCards(rows) {
  const wrap=document.getElementById('cards-wrap');
  wrap.innerHTML=rows.map(r=>`
    <div class="card" data-id="${esc(r.source_id)}" style="${r.source_id===OPEN_ID?'border-color:var(--accent);background:var(--accent-bg)':''}">
      <div class="card-zone-row">${zonePillHTML(r)} ${renderStars(r.rank_score)}</div>
      <div class="card-row2">
        <span>${fmtUSD(r.price_usd)}</span>
        <span>${fmtArea(r.area_m2)}</span>
        <span class="card-ppm">${fmtPPM(r.price_per_m2)}/m²</span>
      </div>
    </div>`).join('');
  wrap.querySelectorAll('.card').forEach((card,i)=>card.addEventListener('click',()=>openPanel(rows[i])));
}
function updateCounts(filtered, total) {
  const label=FILTER==='all'?'All listings':FILTER==='open'?'Open land':'Gated / developments';
  const zLabel=!ZONE_F?'':ZONE_F.type==='no-zone'?' · No zone':ZONE_F.type==='group'?` · ${ZONE_GROUPS[ZONE_F.value]?.label||''}`:(` · ${zoneLabel(ZONE_F.value)}`);
  document.getElementById('filter-count').innerHTML=`<strong>${filtered.toLocaleString()}</strong> of ${total.toLocaleString()} — ${label}${zLabel}`;
  document.getElementById('footer-count').textContent=`${filtered.toLocaleString()} listing${filtered!==1?'s':''}`;
}
function render() {
  const filtered=filteredRows(), sorted=sortedRows(filtered);
  updateSortHeaders(); updateCounts(filtered.length,ALL_DATA.length);
  buildZoneFilter(ALL_DATA);
  if(window.innerWidth>640) renderTable(sorted); else renderCards(sorted);
  if(OPEN_ID){const r=ALL_DATA.find(r=>r.source_id===OPEN_ID);if(r)openPanel(r);}
}

/* ── Wire events ─────────────────────────────────────── */
function wireSegment() {
  document.querySelectorAll('.seg-btn').forEach(btn=>{
    btn.classList.toggle('active',btn.dataset.filter===FILTER);
    btn.addEventListener('click',()=>{
      FILTER=btn.dataset.filter;
      document.querySelectorAll('.seg-btn').forEach(b=>b.classList.toggle('active',b===btn));
      OPEN_ID=null; document.getElementById('side-panel').classList.remove('open');
      pushURL(true); render();
    });
  });
}
function wireSortHeaders() {
  document.querySelectorAll('thead th.sortable').forEach(th=>th.addEventListener('click',()=>{
    const col=th.dataset.col;
    if(SORT_COL===col){SORT_DIR=SORT_DIR==='asc'?'desc':'asc';}
    else{SORT_COL=col;SORT_DIR=th.dataset.def||'asc';}
    pushURL(true); render();
  }));
}
function wireMobileSort() {
  const sel=document.getElementById('mobile-sort');
  sel.value=`${SORT_COL}_${SORT_DIR}`;
  sel.addEventListener('change',()=>{
    const m=sel.value.match(/^(zone|price|area|ppm|stars)_(asc|desc)$/);
    if(m){SORT_COL=m[1];SORT_DIR=m[2];}
    pushURL(true); render();
  });
}
function wireClose() {
  document.getElementById('panel-close').addEventListener('click',closePanel);
  document.getElementById('mobile-close').addEventListener('click',closePanel);
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
  document.getElementById('table-wrap')?.addEventListener('click',e=>{if(!e.target.closest('tr')&&OPEN_ID)closePanel();});
}
let _lastMobile=window.innerWidth<=640;
window.addEventListener('resize',()=>{const m=window.innerWidth<=640;if(m!==_lastMobile){_lastMobile=m;render();}});

/* ── Meta ────────────────────────────────────────────── */
async function loadMeta() {
  try {
    const meta=await fetch(META_URL,{cache:'no-store'}).then(r=>r.json());
    const stamp=new Date(meta.last_updated).toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'});
    document.getElementById('meta-updated').textContent='Updated '+stamp;
    document.getElementById('footer-updated').textContent=stamp;
    document.getElementById('meta-count').textContent=`${meta.total_listings||ALL_DATA.length} listings`;
    const st=meta.source_status||{};
    const live=Object.values(st).filter(v=>v==='green').length;
    const total_src=Object.keys(st).length;
    if(total_src>0){
      document.getElementById('src-live-text').textContent=`${live} of ${total_src} sources live`;
      document.getElementById('src-live').style.display='inline-flex';
    }
  } catch {}
}

/* ── Init ────────────────────────────────────────────── */
async function init() {
  readURL();
  try {
    ALL_DATA=await fetch(DATA_URL,{cache:'no-store'}).then(r=>r.json());
  } catch {
    document.getElementById('table-body').innerHTML=
      '<tr><td colspan="6" style="padding:40px;text-align:center;color:var(--t3)">Failed to load data.</td></tr>';
    return;
  }
  document.querySelectorAll('.seg-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.filter===FILTER));
  wireSegment(); wireSortHeaders(); wireMobileSort(); wireClose();
  render(); loadMeta();
}
init();
</script>
