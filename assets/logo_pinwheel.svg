<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" role="img">
  <title>pulpo.club</title>
  <desc>Geometric eight-arm pinwheel mark next to the pulpo.club wordmark.</desc>

  <!-- mark: 8-arm radial pinwheel, coral, navy center -->
  <g transform="translate(140,140)">
    <g fill="none" stroke="#FF6B6B" stroke-width="14" stroke-linecap="round">
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(0)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(45)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(90)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(135)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(180)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(225)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(270)"/>
      <path d="M 0 0 Q 28 -12, 60 -44" transform="rotate(315)"/>
    </g>
    <circle cx="0" cy="0" r="16" fill="#0F2A3F"/>
  </g>

  <!-- wordmark -->
  <text x="280" y="160" font-family="Georgia, 'Times New Roman', serif"
        font-size="92" font-weight="500" fill="#0F2A3F" letter-spacing="-2">pulpo<tspan fill="#FF6B6B">.club</tspan></text>
  <text x="282" y="195" font-family="-apple-system, 'Helvetica Neue', sans-serif"
        font-size="14" fill="#0F2A3F" opacity="0.6" letter-spacing="6">EIGHT FINDS · EVERY WEDNESDAY</text>
</svg>
